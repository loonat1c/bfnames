<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Трекер переводов — Baddest Females</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111009;--surface:#1c1b18;--surface2:#262420;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
  --text:#f2ede4;--text2:#c8c2b8;--text3:#8a8480;
  --accent:#d4a853;--accent2:#f0d898;--btn-text:#0f0e0c;
  --radius:12px;--radius-lg:16px;
  --c-sergey:#5ba8f5;--c-yaroslavna:#e8739a;--c-victoria:#4ec068;--c-kristina:#a060f0;
}
body.light{
  --bg:#f2efe8;--surface:#fff;--surface2:#e8e4da;
  --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.20);
  --text:#18160f;--text2:#3a3830;--text3:#706c66;
  --accent:#8c5e18;--accent2:#5c3c08;--btn-text:#fff8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;background:var(--bg);z-index:100;gap:12px}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);display:flex;align-items:center;gap:12px}
.back-btn{font-size:13px;padding:6px 12px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.back-btn:hover{border-color:var(--accent);color:var(--text)}
.header-right{display:flex;align-items:center;gap:12px}
.toggle-switch{position:relative;width:38px;height:22px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-track{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;transition:background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--text3);transition:transform .2s,background .2s}
.toggle-switch input:checked~.toggle-thumb{transform:translateX(16px);background:#fff}
.toggle-icon{font-size:14px;color:var(--text2)}
.theme-toggle{display:flex;align-items:center;gap:6px}

/* LOGIN SCREEN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);gap:24px;padding:2rem}
.login-title{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text);text-align:center}
.login-sub{font-size:16px;color:var(--text3);text-align:center}
.login-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:400px;width:100%}
.login-card{padding:20px;border:2px solid var(--border2);border-radius:var(--radius-lg);cursor:pointer;text-align:center;transition:all .2s;background:var(--surface)}
.login-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.login-card .avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff}
.login-card .name{font-size:16px;font-weight:600;color:var(--text)}
.login-card .role{font-size:12px;color:var(--text3);margin-top:3px}

/* MAIN APP */
#app{display:none}
.app-layout{display:flex;gap:0;height:calc(100vh - 64px)}

/* SIDEBAR */
.sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;background:var(--bg)}
.sidebar-section{padding:1rem}
.sidebar-section+.sidebar-section{border-top:1px solid var(--border)}
.section-title{font-size:11px;letter-spacing:.09em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;font-weight:500}
.user-badge{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:var(--radius);margin-bottom:8px}
.user-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.user-name{font-size:14px;font-weight:600;color:var(--text)}
.user-name-small{font-size:12px;color:var(--text3)}
.switch-user-btn{font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;width:100%}
.switch-user-btn:hover{border-color:var(--accent);color:var(--text)}

/* NAV */
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text2);transition:all .15s;border:none;background:transparent;font-family:'DM Sans',sans-serif;width:100%;text-align:left}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent2)}
.nav-icon{font-size:16px;flex-shrink:0}

/* STATS SIDEBAR */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text3)}
.stat-value{font-weight:600;color:var(--text)}
.stat-dot{width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0;display:inline-block}

/* MAIN CONTENT */
.main-content{flex:1;overflow-y:auto;padding:1.5rem 2rem;min-width:0}

/* CALENDAR HEADER */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text)}
.cal-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-today-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .15s}
.cal-today-btn:hover{border-color:var(--accent);color:var(--text)}

/* CALENDAR GRID */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-day-header{text-align:center;font-size:12px;font-weight:600;color:var(--text3);padding:6px 0;letter-spacing:.06em;text-transform:uppercase}
.cal-day{min-height:110px;border:1px solid var(--border);border-radius:10px;padding:8px;position:relative;background:var(--surface);transition:border-color .15s,background .15s;overflow:hidden;vertical-align:top}
.cal-day:hover{border-color:var(--border2)}
.cal-day.today{border-color:var(--accent);background:rgba(212,168,83,.04)}
.cal-day.other-month{opacity:.35}
.cal-day-num{font-size:13px;font-weight:600;color:var(--text3);margin-bottom:5px;line-height:1}
.cal-day.today .cal-day-num{color:var(--accent)}
.add-entry-btn{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);font-size:14px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;padding:0;font-family:inherit}
.cal-day:hover .add-entry-btn{display:flex}
.add-entry-btn:hover{background:var(--accent);border-color:var(--accent);color:var(--btn-text)}

/* ENTRIES */
.entry-chip{border-radius:6px;padding:3px 6px;margin-bottom:3px;font-size:11px;line-height:1.35;cursor:pointer;position:relative;transition:filter .15s;word-break:break-word}
.entry-chip:hover{filter:brightness(1.15)}
.entry-chip .ep-actions{display:none;position:absolute;top:2px;right:2px;gap:2px}
.entry-chip:hover .ep-actions{display:flex}
.ep-btn{border:none;background:rgba(0,0,0,.3);color:#fff;cursor:pointer;font-size:10px;padding:1px 4px;border-radius:3px;line-height:1.4;transition:background .12s}
.ep-btn:hover{background:rgba(0,0,0,.5)}
.entry-project{font-weight:600;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;padding-right:36px}
.entry-meta{font-size:10px;opacity:.8;display:block;padding-right:36px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.75rem;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:16px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:13px;color:var(--text3);margin-bottom:5px}
.modal-field input,.modal-field select{width:100%;padding:10px 13px;font-size:15px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.modal-field input:focus,.modal-field select:focus{border-color:var(--accent)}
.modal-field select option{background:var(--bg)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.btn{padding:10px 20px;font-size:15px;border-radius:var(--radius);background:var(--accent);color:var(--btn-text);border:none;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);font-weight:400}
.btn-ghost:hover{background:var(--surface2);opacity:1}
.btn-danger{background:#b03030;color:#fff;border:none}

/* STATS PAGE */
.stats-page{display:none}
.stats-page.active{display:block}
.date-range{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem}
.date-range input{padding:8px 12px;font-size:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:'DM Sans',sans-serif}
.date-range input:focus{border-color:var(--accent)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.stat-card-title{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.stat-card-value{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text)}
.stat-card-sub{font-size:12px;color:var(--text3);margin-top:4px}
.stats-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.stats-table-header{display:grid;grid-template-columns:1fr 120px 80px 80px 80px;gap:0;background:var(--surface2);padding:10px 16px;font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.stats-table-row{display:grid;grid-template-columns:1fr 120px 80px 80px 80px;gap:0;padding:10px 16px;border-top:1px solid var(--border);font-size:14px;color:var(--text2);align-items:center}
.stats-table-row:hover{background:var(--surface2)}

/* HISTORY PAGE */
.history-page{display:none}
.history-page.active{display:block}
.history-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.history-item:last-child{border-bottom:none}
.history-time{font-size:12px;color:var(--text3);white-space:nowrap;min-width:100px;padding-top:2px}
.history-desc{flex:1;font-size:14px;color:var(--text2);line-height:1.5}
.history-desc b{color:var(--text);font-weight:500}
.history-undo{font-size:13px;padding:5px 12px;border-radius:8px;background:transparent;border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;transition:all .15s}
.history-undo:hover{border-color:var(--accent);color:var(--accent)}
.history-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* BADGES */
.user-color-chip{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}

.empty{font-size:15px;color:var(--text3);padding:4px 0}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-family:'DM Serif Display',serif;font-size:15px;color:var(--text3)}

@media(max-width:900px){
  .sidebar{width:220px}
  .stats-table-header,.stats-table-row{grid-template-columns:1fr 100px 60px 60px 60px;font-size:12px}
}
@media(max-width:700px){
  .app-layout{flex-direction:column}
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .cal-day{min-height:60px}
  .main-content{padding:1rem}
}
</style>
</head>
<body>
<div id="loading">연결 중…</div>

<header>
  <div class="logo">
    <a href="index.html" class="back-btn">← Трекер</a>
    Переводы
  </div>
  <div class="header-right">
    <div id="header-user" style="display:none;align-items:center;gap:8px;font-size:13px;color:var(--text2)"></div>
    <div class="theme-toggle">
      <span class="toggle-icon">☽</span>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-chk" onchange="toggleTheme(this.checked)">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
      <span class="toggle-icon">☀</span>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-title">Трекер переводов</div>
  <div class="login-sub">Войди от своего имени</div>
  <div class="login-grid" id="login-grid"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="section-title">Текущий пользователь</div>
        <div class="user-badge">
          <div class="user-dot" id="sb-dot"></div>
          <div><div class="user-name" id="sb-name"></div><div class="user-name-small" id="sb-role"></div></div>
        </div>
        <button class="switch-user-btn" onclick="switchUser()">Сменить пользователя</button>
      </div>
      <div class="sidebar-section">
        <div class="section-title">Навигация</div>
        <button class="nav-item active" id="nav-calendar" onclick="showPage('calendar')"><span class="nav-icon">📅</span>Календарь</button>
        <button class="nav-item" id="nav-stats" onclick="showPage('stats')"><span class="nav-icon">📊</span>Статистика</button>
        <button class="nav-item" id="nav-history" onclick="showPage('history')"><span class="nav-icon">🕐</span>История</button>
      </div>
      <div class="sidebar-section">
        <div class="section-title">Этот месяц</div>
        <div id="sidebar-stats"></div>
      </div>
    </div>

    <div class="main-content">
      <!-- CALENDAR PAGE -->
      <div id="page-calendar">
        <div class="cal-header">
          <div class="cal-nav">
            <button class="cal-btn" onclick="calNav(-1)">‹</button>
            <div class="cal-title" id="cal-title"></div>
            <button class="cal-btn" onclick="calNav(1)">›</button>
          </div>
          <button class="cal-today-btn" onclick="calToday()">Сегодня</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <!-- STATS PAGE -->
      <div id="page-stats" style="display:none">
        <h2 style="font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:1.25rem">Статистика</h2>
        <div class="date-range">
          <span style="font-size:14px;color:var(--text3)">С</span>
          <input type="date" id="stats-from">
          <span style="font-size:14px;color:var(--text3)">По</span>
          <input type="date" id="stats-to">
          <button class="btn" onclick="renderStats()">Показать</button>
        </div>
        <div id="stats-content"></div>
      </div>

      <!-- HISTORY PAGE -->
      <div id="page-history" style="display:none">
        <h2 style="font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:1.25rem">История изменений</h2>
        <div style="margin-bottom:1rem;display:flex;align-items:center;gap:10px">
          <span style="font-size:14px;color:var(--text3)">Месяц:</span>
          <select id="history-month-sel" onchange="renderHistory()" style="padding:7px 11px;font-size:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:'DM Sans',sans-serif"></select>
        </div>
        <div class="stats-table" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
          <div id="history-list"><div class="empty">Нет изменений</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ENTRY MODAL -->
<div id="entry-modal" style="display:none" class="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="entry-modal-title">Добавить перевод</div>
    <div class="modal-field">
      <label>Название проекта</label>
      <input id="ef-project" placeholder="Название дорамы / проекта">
    </div>
    <div class="modal-field">
      <label>Номер эпизода</label>
      <input id="ef-episode" type="number" min="1" placeholder="например, 5">
    </div>
    <div class="modal-field">
      <label>Номер части</label>
      <select id="ef-part">
        <option value="всё">всё</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Количество строк</label>
      <input id="ef-lines" type="number" min="1" placeholder="например, 120">
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeEntryModal()">Отмена</button>
      <button class="btn" id="entry-modal-save" onclick="saveEntry()">Сохранить</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-modal" style="display:none" class="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="confirm-title">Подтвердить действие</div>
    <div style="font-size:15px;color:var(--text2);margin-bottom:1.5rem" id="confirm-text"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">Отмена</button>
      <button class="btn btn-danger" id="confirm-ok">Подтвердить</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,set,remove,push,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyAg_UhVP2DRU_jrqJD-Or3Iy8ZEIQWaAIU",authDomain:"bfnames.firebaseapp.com",databaseURL:"https://bfnames-default-rtdb.europe-west1.firebasedatabase.app",projectId:"bfnames",storageBucket:"bfnames.firebasestorage.app",messagingSenderId:"1066954721078",appId:"1:1066954721078:web:fb729d5ccb8671db175597"};
const db=getDatabase(initializeApp(cfg));

// ── USERS ────────────────────────────────────────────────────────────────────
const USERS={
  sergey:{name:'Сергей',color:'#5ba8f5',emoji:'🦋',canEdit:true},
  yaroslavna:{name:'Ярославна',color:'#e8739a',emoji:'🌸',canEdit:true},
  victoria:{name:'Виктория',color:'#4ec068',emoji:'🌿',canEdit:true},
  kristina:{name:'Кристина',color:'#a060f0',emoji:'✨',canEdit:false},
};
const USER_KEYS=Object.keys(USERS);

let currentUser=sessionStorage.getItem('tr_user')||null;
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
let allEntries={};
let allHistory={};
let editingEntryKey=null;
let editingDate=null;
let pendingDate=null;

// ── INIT ─────────────────────────────────────────────────────────────────────
onValue(ref(db,'translations'),snap=>{
  allEntries=snap.val()||{};
  document.getElementById('loading').style.display='none';
  if(currentUser) renderAll();
  else showLogin();
},e=>{document.getElementById('loading').style.display='none';console.error(e);showLogin();});

onValue(ref(db,'tr_history'),snap=>{allHistory=snap.val()||{};});

// ── THEME ─────────────────────────────────────────────────────────────────────
(function(){
  if(localStorage.getItem('tr_theme')==='light'){
    document.body.classList.add('light');
    const c=document.getElementById('theme-chk');if(c)c.checked=true;
  }
})();
window.toggleTheme=function(l){document.body.classList.toggle('light',l);localStorage.setItem('tr_theme',l?'light':'dark');};

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  const grid=document.getElementById('login-grid');
  grid.innerHTML=USER_KEYS.map(k=>{
    const u=USERS[k];
    return `<div class="login-card" onclick="login('${k}')" style="border-color:${u.color}22">
      <div class="avatar" style="background:${u.color}">${u.emoji}</div>
      <div class="name">${u.name}</div>
      <div class="role">${u.canEdit?'Переводчик':'Только просмотр'}</div>
    </div>`;
  }).join('');
}

window.login=function(key){
  currentUser=key;
  sessionStorage.setItem('tr_user',key);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  renderAll();
};
window.switchUser=function(){currentUser=null;sessionStorage.removeItem('tr_user');showLogin();};

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){
  const u=USERS[currentUser];
  // header
  const hw=document.getElementById('header-user');
  hw.style.display='flex';
  hw.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:${u.color}"></div><span>${u.name}</span>`;
  // sidebar
  document.getElementById('sb-dot').style.background=u.color;
  document.getElementById('sb-name').textContent=u.name;
  document.getElementById('sb-role').textContent=u.canEdit?'Переводчик':'Только просмотр';
  renderCalendar();
  renderSidebarStats();
}

// ── PAGE NAVIGATION ───────────────────────────────────────────────────────────
window.showPage=function(page){
  ['calendar','stats','history'].forEach(p=>{
    document.getElementById('page-'+p).style.display=p===page?'block':'none';
    document.getElementById('nav-'+p).classList.toggle('active',p===page);
  });
  if(page==='stats')initStatsDefaults();
  if(page==='history')renderHistory();
};

// ── CALENDAR ──────────────────────────────────────────────────────────────────
const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_RU=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function renderCalendar(){
  document.getElementById('cal-title').textContent=MONTHS_RU[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');

  // day headers
  let html=DAYS_RU.map(d=>`<div class="cal-day-header">${d}</div>`).join('');

  // first day of month (Monday=0)
  const first=new Date(calYear,calMonth,1);
  let startDow=(first.getDay()+6)%7; // 0=Mon

  // days in month and prev month
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();

  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // total cells
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;

  for(let i=0;i<totalCells;i++){
    let d,m,y,isOther=false;
    if(i<startDow){d=daysInPrev-startDow+i+1;m=calMonth===0?11:calMonth-1;y=calMonth===0?calYear-1:calYear;isOther=true;}
    else if(i>=startDow+daysInMonth){d=i-startDow-daysInMonth+1;m=calMonth===11?0:calMonth+1;y=calMonth===11?calYear+1:calYear;isOther=true;}
    else{d=i-startDow+1;m=calMonth;y=calYear;}
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const canAdd=USERS[currentUser].canEdit;
    html+=`<div class="cal-day${isOther?' other-month':''}${isToday?' today':''}">
      <div class="cal-day-num">${d}</div>
      ${renderDayEntries(dateStr)}
      ${canAdd?`<button class="add-entry-btn" onclick="openAddEntry(event,'${dateStr}')">+</button>`:''}
    </div>`;
  }
  grid.innerHTML=html;
}

function renderDayEntries(dateStr){
  const dayEntries=getDayEntries(dateStr);
  if(!dayEntries.length)return'';
  // Sort: current user first
  dayEntries.sort((a,b)=>{
    if(a.user===currentUser&&b.user!==currentUser)return -1;
    if(b.user===currentUser&&a.user!==currentUser)return 1;
    return 0;
  });
  const canEdit=USERS[currentUser].canEdit;
  return dayEntries.map(e=>{
    const u=USERS[e.user]||{color:'#888',name:e.user};
    const isOwn=e.user===currentUser;
    const editBtn=isOwn&&canEdit?`<button class="ep-btn" onclick="openEditEntry(event,'${e.key}','${dateStr}')" title="Редактировать">✎</button>`:'';
    const delBtn=isOwn&&canEdit?`<button class="ep-btn" style="background:rgba(176,48,48,.5)" onclick="confirmDeleteEntry(event,'${e.key}','${dateStr}')" title="Удалить">×</button>`:'';
    const partStr=e.part==='всё'?'всё':'ч.'+e.part;
    return `<div class="entry-chip" style="background:${u.color}22;border:1px solid ${u.color}55;color:${u.color}">
      <span class="entry-project" title="${e.project||''}">${e.project||'—'}</span>
      <span class="entry-meta">Эп.${e.episode||'?'} ${partStr} · ${e.lines||0} стр.</span>
      <div class="ep-actions">${editBtn}${delBtn}</div>
    </div>`;
  }).join('');
}

function getDayEntries(dateStr){
  const result=[];
  const key=dateStr.replace(/-/g,'_');
  const day=(allEntries[key])||{};
  Object.entries(day).forEach(([k,v])=>result.push({...v,key:`${key}/${k}`,dateKey:key,entryId:k}));
  return result;
}

window.calNav=function(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}renderCalendar();renderSidebarStats();};
window.calToday=function(){calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCalendar();renderSidebarStats();};

// ── ENTRY MODAL ───────────────────────────────────────────────────────────────
window.openAddEntry=function(e,dateStr){
  e.stopPropagation();
  if(!USERS[currentUser].canEdit)return;
  editingEntryKey=null;
  pendingDate=dateStr;
  document.getElementById('entry-modal-title').textContent='Добавить перевод — '+formatDateRu(dateStr);
  document.getElementById('ef-project').value='';
  document.getElementById('ef-episode').value='';
  document.getElementById('ef-part').value='всё';
  document.getElementById('ef-lines').value='';
  document.getElementById('entry-modal').style.display='flex';
  setTimeout(()=>document.getElementById('ef-project').focus(),50);
};

window.openEditEntry=function(e,keyPath,dateStr){
  e.stopPropagation();
  if(!USERS[currentUser].canEdit)return;
  const parts=keyPath.split('/');
  const dateKey=parts[0],entryId=parts[1];
  const entry=(allEntries[dateKey]||{})[entryId];
  if(!entry||entry.user!==currentUser)return;
  editingEntryKey=keyPath;
  pendingDate=dateStr;
  document.getElementById('entry-modal-title').textContent='Редактировать перевод';
  document.getElementById('ef-project').value=entry.project||'';
  document.getElementById('ef-episode').value=entry.episode||'';
  document.getElementById('ef-part').value=entry.part||'всё';
  document.getElementById('ef-lines').value=entry.lines||'';
  document.getElementById('entry-modal').style.display='flex';
  setTimeout(()=>document.getElementById('ef-project').focus(),50);
};

window.closeEntryModal=function(){document.getElementById('entry-modal').style.display='none';editingEntryKey=null;pendingDate=null;};
document.getElementById('entry-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEntryModal();});

window.saveEntry=function(){
  const project=document.getElementById('ef-project').value.trim();
  if(!project){document.getElementById('ef-project').focus();return;}
  const episode=document.getElementById('ef-episode').value.trim();
  const part=document.getElementById('ef-part').value;
  const lines=parseInt(document.getElementById('ef-lines').value)||0;
  const data={user:currentUser,project,episode,part,lines,ts:Date.now()};

  if(editingEntryKey){
    // update
    const parts=editingEntryKey.split('/');
    const dateKey=parts[0],entryId=parts[1];
    const oldEntry=(allEntries[dateKey]||{})[entryId]||{};
    update(ref(db,`translations/${editingEntryKey}`),data);
    logHistory('edit',pendingDate,{...data},{...oldEntry,key:editingEntryKey});
  } else {
    // add
    const dateKey=pendingDate.replace(/-/g,'_');
    const r=push(ref(db,`translations/${dateKey}`));
    set(r,data);
    logHistory('add',pendingDate,{...data,key:`${dateKey}/${r.key}`},{});
  }
  closeEntryModal();
};

// ── DELETE ────────────────────────────────────────────────────────────────────
window.confirmDeleteEntry=function(e,keyPath,dateStr){
  e.stopPropagation();
  const parts=keyPath.split('/');
  const dateKey=parts[0],entryId=parts[1];
  const entry=(allEntries[dateKey]||{})[entryId];
  if(!entry||entry.user!==currentUser)return;
  showConfirm(
    'Удалить запись?',
    `«${entry.project}» — Эп.${entry.episode}, ч.${entry.part}, ${entry.lines} стр.`,
    ()=>{
      logHistory('delete',dateStr,{},{...entry,key:keyPath});
      remove(ref(db,`translations/${keyPath}`));
    }
  );
};

// ── CONFIRM MODAL ─────────────────────────────────────────────────────────────
let _confirmOk=null;
function showConfirm(title,text,onOk){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-text').textContent=text;
  document.getElementById('confirm-modal').style.display='flex';
  _confirmOk=onOk;
  document.getElementById('confirm-ok').onclick=()=>{_confirmOk&&_confirmOk();closeConfirm();};
}
window.closeConfirm=()=>{document.getElementById('confirm-modal').style.display='none';_confirmOk=null;};
document.getElementById('confirm-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeConfirm();});

// ── HISTORY ───────────────────────────────────────────────────────────────────
function logHistory(action,dateStr,newData,oldData){
  const monthKey=dateStr.substring(0,7).replace('-','_');
  const u=USERS[currentUser];
  const desc=action==='add'?`Добавил(а) <b>${newData.project}</b> (эп.${newData.episode}, ч.${newData.part}, ${newData.lines} стр.)`
    :action==='edit'?`Изменил(а) <b>${newData.project}</b> (эп.${newData.episode}, ч.${newData.part}, ${newData.lines} стр.)`
    :`Удалил(а) <b>${oldData.project}</b>`;
  push(ref(db,`tr_history/${monthKey}`),{user:currentUser,action,desc,dateStr,newData,oldData,ts:Date.now()});
}

window.renderHistory=function(){
  const sel=document.getElementById('history-month-sel');
  // populate options
  const now=new Date();
  const opts=[];
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=`${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=MONTHS_RU[d.getMonth()]+' '+d.getFullYear();
    opts.push(`<option value="${key}"${i===0?' selected':''}>${label}</option>`);
  }
  if(!sel.options.length)sel.innerHTML=opts.join('');
  const monthKey=sel.value;
  const entries=Object.entries((allHistory[monthKey])||{}).sort((a,b)=>b[1].ts-a[1].ts);
  const list=document.getElementById('history-list');
  if(!entries.length){list.innerHTML='<div class="empty">Нет изменений за этот месяц</div>';return;}
  list.innerHTML=entries.map(([k,h])=>{
    const u=USERS[h.user]||{name:h.user,color:'#888'};
    const d=new Date(h.ts);
    const time=d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    const canUndo=h.action!=='edit'||(h.user===currentUser&&USERS[currentUser].canEdit);
    const undoBtn=canUndo&&USERS[currentUser].canEdit?`<button class="history-undo" onclick="undoHistory('${monthKey}','${k}')">↩ Отменить</button>`:'';
    return `<div class="history-item">
      <div class="history-dot" style="background:${u.color}"></div>
      <div class="history-time">${time}</div>
      <div class="history-desc"><b style="color:${u.color}">${u.name}</b>: ${h.desc}</div>
      ${undoBtn}
    </div>`;
  }).join('');
};

window.undoHistory=function(monthKey,hKey){
  const h=(allHistory[monthKey]||{})[hKey];if(!h)return;
  if(!USERS[currentUser].canEdit)return;
  showConfirm('Откатить изменение?',`Действие будет отменено для записи «${(h.newData||h.oldData||{}).project||'—'}»`,()=>{
    if(h.action==='add'){
      // undo add = delete
      if(h.newData&&h.newData.key) remove(ref(db,`translations/${h.newData.key}`));
    } else if(h.action==='delete'){
      // undo delete = restore
      if(h.oldData&&h.oldData.key){
        const parts=h.oldData.key.split('/');
        const r={...h.oldData};delete r.key;
        set(ref(db,`translations/${h.oldData.key}`),r);
      }
    } else if(h.action==='edit'){
      // undo edit = restore old data
      if(h.newData&&h.newData.key){
        const r={...h.oldData};delete r.key;
        update(ref(db,`translations/${h.newData.key}`),r);
      }
    }
    remove(ref(db,`tr_history/${monthKey}/${hKey}`));
  });
};

// ── STATS ─────────────────────────────────────────────────────────────────────
function initStatsDefaults(){
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth(),1);
  document.getElementById('stats-from').value=from.toISOString().split('T')[0];
  document.getElementById('stats-to').value=now.toISOString().split('T')[0];
  renderStats();
}

window.renderStats=function(){
  const from=document.getElementById('stats-from').value;
  const to=document.getElementById('stats-to').value;
  if(!from||!to)return;

  // gather entries in range
  const entries=[];
  Object.entries(allEntries).forEach(([dateKey,day])=>{
    const dateStr=dateKey.replace(/_/g,'-').replace(/(\d{4})-(\d{2})-(\d{2})/,'$1-$2-$3');
    // dateKey is YYYY_MM_DD
    const ds=dateKey.replace(/_/g,'-');
    if(ds>=from&&ds<=to){
      Object.values(day).forEach(e=>entries.push({...e,date:ds}));
    }
  });

  // totals
  const totalLines=entries.reduce((s,e)=>s+(e.lines||0),0);
  const totalParts=entries.filter(e=>e.part!=='всё').length+entries.filter(e=>e.part==='всё').length;

  // by user
  const byUser={};
  USER_KEYS.forEach(k=>{byUser[k]={lines:0,parts:0,entries:0};});
  entries.forEach(e=>{
    if(byUser[e.user]){byUser[e.user].lines+=e.lines||0;byUser[e.user].parts++;byUser[e.user].entries++;}
  });

  const content=document.getElementById('stats-content');
  content.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-card-title">Всего строк</div><div class="stat-card-value">${totalLines.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-card-title">Записей</div><div class="stat-card-value">${entries.length}</div></div>
      <div class="stat-card"><div class="stat-card-title">Переводчиков</div><div class="stat-card-value">${USER_KEYS.filter(k=>byUser[k].entries>0).length}</div></div>
    </div>
    <div class="stats-table">
      <div class="stats-table-header"><div>Переводчик</div><div>Строк</div><div>Записей</div></div>
      ${USER_KEYS.sort((a,b)=>byUser[b].lines-byUser[a].lines).map(k=>{
        const u=USERS[k];const s=byUser[k];
        return `<div class="stats-table-row">
          <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${u.color};flex-shrink:0"></div>${u.name}</div>
          <div style="font-weight:600">${s.lines.toLocaleString()}</div>
          <div>${s.entries}</div>
        </div>`;
      }).join('')}
    </div>
    ${entries.length>0?`
    <div class="stats-table" style="margin-top:12px">
      <div class="stats-table-header" style="grid-template-columns:1fr 120px 60px 60px 80px 80px"><div>Проект</div><div>Дата</div><div>Эп.</div><div>Часть</div><div>Строк</div><div>Автор</div></div>
      ${[...entries].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
        const u=USERS[e.user]||{name:e.user,color:'#888'};
        return `<div class="stats-table-row" style="grid-template-columns:1fr 120px 60px 60px 80px 80px">
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.project||'—'}</div>
          <div style="font-size:12px;color:var(--text3)">${formatDateRu(e.date)}</div>
          <div>${e.episode||'—'}</div>
          <div>${e.part}</div>
          <div style="font-weight:600">${e.lines||0}</div>
          <div style="color:${u.color};font-weight:600">${u.name}</div>
        </div>`;
      }).join('')}
    </div>`:''}
  `;
};

// ── SIDEBAR STATS ─────────────────────────────────────────────────────────────
function renderSidebarStats(){
  const monthKey=`${calYear}_${String(calMonth+1).padStart(2,'0')}`;
  const byUser={};
  USER_KEYS.forEach(k=>{byUser[k]={lines:0,parts:0};});
  // gather this month's entries
  Object.entries(allEntries).forEach(([dateKey,day])=>{
    if(!dateKey.startsWith(monthKey)) return;
    Object.values(day).forEach(e=>{
      if(byUser[e.user]){byUser[e.user].lines+=e.lines||0;byUser[e.user].parts++;}
    });
  });
  const el=document.getElementById('sidebar-stats');
  el.innerHTML=USER_KEYS.filter(k=>byUser[k].parts>0).map(k=>{
    const u=USERS[k];const s=byUser[k];
    return `<div class="stat-row"><div class="stat-label"><span class="stat-dot" style="background:${u.color}"></span>${u.name}</div><div class="stat-value">${s.lines.toLocaleString()} стр.</div></div>`;
  }).join('')||'<div class="empty" style="font-size:13px">Нет данных</div>';
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function formatDateRu(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('ru',{day:'2-digit',month:'short'});
}
