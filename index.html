<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baddest Females - Трекер обращений</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111009;--surface:#1c1b18;--surface2:#262420;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --text:#f2ede4;--text2:#b0aa9f;--text3:#6a6560;
  --accent:#d4a853;--accent2:#f0d898;
  --ty-bg:#0b2016;--ty-text:#3dd68c;
  --vy-bg:#0b1830;--vy-text:#5ba8f5;
  --radius:10px;--radius-lg:14px;
}
body.light{
  --bg:#f2efe8;--surface:#fff;--surface2:#e8e4da;
  --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);
  --text:#18160f;--text2:#4a4640;--text3:#8a857c;
  --accent:#8c5e18;--accent2:#5c3c08;
  --ty-bg:#d4f5e4;--ty-text:#145c38;
  --vy-bg:#d4e8fc;--vy-text:#0f3d82;
}
body.palette-sakura{--bg:#1a0f14;--surface:#261520;--surface2:#32202b;--border:rgba(255,200,220,.09);--border2:rgba(255,200,220,.16);--text:#f5e6ed;--text2:#c4a0b4;--text3:#7a5068;--accent:#e8739a;--accent2:#f5b8cf;--ty-bg:#1a2618;--ty-text:#5dd68a;--vy-bg:#1a1030;--vy-text:#8baaf5}
body.palette-sakura.light{--bg:#fdf0f5;--surface:#fff;--surface2:#f5e0ec;--border:rgba(180,60,100,.10);--border2:rgba(180,60,100,.18);--text:#2a0f1c;--text2:#7a3058;--text3:#b87898;--accent:#c0305a;--accent2:#8a1a38;--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#dce8fd;--vy-text:#0f3882}
body.palette-ocean{--bg:#080e18;--surface:#101828;--surface2:#182030;--border:rgba(80,160,255,.09);--border2:rgba(80,160,255,.16);--text:#e0eeff;--text2:#8ab0d8;--text3:#4a7098;--accent:#3d9cf0;--accent2:#90ccff;--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#0b1830;--vy-text:#5ba8f5}
body.palette-ocean.light{--bg:#eef4fc;--surface:#fff;--surface2:#daeaf8;--border:rgba(20,80,160,.10);--border2:rgba(20,80,160,.18);--text:#081428;--text2:#1a4878;--text3:#5888b8;--accent:#0a5abf;--accent2:#063a88;--ty-bg:#d4f5e6;--ty-text:#0a5030;--vy-bg:#d4e8fc;--vy-text:#0f3d82}
body.palette-forest{--bg:#080f0a;--surface:#101a12;--surface2:#182418;--border:rgba(80,200,100,.09);--border2:rgba(80,200,100,.15);--text:#e2f0e4;--text2:#88b890;--text3:#486850;--accent:#4ec068;--accent2:#a0e0a8;--ty-bg:#0b2014;--ty-text:#3dd88a;--vy-bg:#0b1a30;--vy-text:#60a8f8}
body.palette-forest.light{--bg:#eef6ee;--surface:#fff;--surface2:#daeeda;--border:rgba(20,100,40,.10);--border2:rgba(20,100,40,.18);--text:#081408;--text2:#1a5828;--text3:#508860;--accent:#1a7030;--accent2:#0a4820;--ty-bg:#d4f5e2;--ty-text:#0a5028;--vy-bg:#d4e6fc;--vy-text:#0f3882}
body.palette-violet{--bg:#0e080f;--surface:#181020;--surface2:#22182e;--border:rgba(160,100,255,.09);--border2:rgba(160,100,255,.16);--text:#f0e8ff;--text2:#b090d8;--text3:#705090;--accent:#a060f0;--accent2:#d0a8ff;--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#180b30;--vy-text:#9878f8}
body.palette-violet.light{--bg:#f4f0fc;--surface:#fff;--surface2:#ece4f8;--border:rgba(80,20,160,.10);--border2:rgba(80,20,160,.18);--text:#180828;--text2:#501888;--text3:#9068b8;--accent:#6020c0;--accent2:#3a0890;--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#e4d8fc;--vy-text:#4010a0}
body.palette-rose{--bg:#140a0a;--surface:#201010;--surface2:#2c1818;--border:rgba(255,120,100,.09);--border2:rgba(255,120,100,.16);--text:#fff0ee;--text2:#d8a090;--text3:#885850;--accent:#f05840;--accent2:#ffb0a0;--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#0b1830;--vy-text:#5ba8f5}
body.palette-rose.light{--bg:#fdf2f0;--surface:#fff;--surface2:#f8e0dc;--border:rgba(180,40,20,.10);--border2:rgba(180,40,20,.18);--text:#280808;--text2:#7a1808;--text3:#b86858;--accent:#c02808;--accent2:#880c00;--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#dce8fd;--vy-text:#0f3882}
body.palette-slate{--bg:#090c12;--surface:#111620;--surface2:#1a2030;--border:rgba(100,140,200,.09);--border2:rgba(100,140,200,.16);--text:#e8eef8;--text2:#8898b8;--text3:#485878;--accent:#6888d0;--accent2:#a8c0f0;--ty-bg:#0a2018;--ty-text:#3dd68c;--vy-bg:#0a1428;--vy-text:#80a8f8}
body.palette-slate.light{--bg:#f0f2f8;--surface:#fff;--surface2:#dce4f0;--border:rgba(40,60,120,.10);--border2:rgba(40,60,120,.18);--text:#080c20;--text2:#283870;--text3:#6878a8;--accent:#2840a0;--accent2:#0c2070;--ty-bg:#d4f5e4;--ty-text:#0a5030;--vy-bg:#d8e4fc;--vy-text:#0c2a88}
body.palette-copper{--bg:#110d08;--surface:#1c1410;--surface2:#281e16;--border:rgba(200,120,60,.09);--border2:rgba(200,120,60,.16);--text:#f8ece0;--text2:#c89870;--text3:#805840;--accent:#c87840;--accent2:#f0b880;--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#0b1830;--vy-text:#5ba8f5}
body.palette-copper.light{--bg:#faf4ec;--surface:#fff;--surface2:#f0e4d0;--border:rgba(140,70,20,.10);--border2:rgba(140,70,20,.18);--text:#200c00;--text2:#783010;--text3:#b07848;--accent:#a04808;--accent2:#702800;--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#d8e8fc;--vy-text:#0f3882}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-weight:300}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;background:var(--bg);z-index:200}
.logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--accent);letter-spacing:.02em}
.logo span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}
.header-right{display:flex;align-items:center;gap:14px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#3a3835;display:inline-block;margin-right:6px;transition:background .3s}
.status-dot.online{background:var(--ty-text)}
body.light .status-dot{background:#c8c0b4}
#status-text{font-size:13px;color:var(--text3)}

/* PALETTE BUTTON + DROPDOWN */
.palette-wrap{position:relative}
.palette-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.palette-btn:hover{border-color:var(--accent);color:var(--text)}
.palette-btn-swatch{width:12px;height:12px;border-radius:50%;background:var(--accent);flex-shrink:0}
.palette-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:12px;display:none;z-index:300;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.palette-dropdown.open{display:block}
.palette-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pal-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;position:relative}
.pal-dot:hover{transform:scale(1.15)}
.pal-dot.active{border-color:var(--text)}
.pal-dot-label{font-size:10px;color:var(--text3);text-align:center;margin-top:3px;white-space:nowrap}
.pal-item{display:flex;flex-direction:column;align-items:center}

/* THEME TOGGLE */
.theme-toggle{display:flex;align-items:center;gap:7px}
.toggle-switch{position:relative;width:34px;height:19px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-track{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;transition:background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--accent);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:13px;height:13px;border-radius:50%;background:var(--text3);transition:transform .2s,background .2s}
.toggle-switch input:checked~.toggle-thumb{transform:translateX(15px);background:#fff}
.toggle-icon{font-size:13px;color:var(--text2)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 60px)}

/* SIDEBAR */
.sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-top{padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-add{display:flex;gap:6px;margin-bottom:8px}
.sidebar-add input{flex:1;font-size:13px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif}
.sidebar-add input:focus{border-color:var(--accent)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px;background:var(--accent);color:#0f0e0c;border:none;cursor:pointer;font-weight:500;flex-shrink:0;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn-sm:hover{opacity:.85}
.sidebar-search-row input{width:100%;font-size:13px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif}
.sidebar-search-row input:focus{border-color:var(--accent)}
.sidebar-group{padding:.75rem 1rem .5rem}
.sidebar-label{font-size:11px;letter-spacing:.09em;color:var(--text3);text-transform:uppercase;margin-bottom:5px;padding:0 4px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 7px;border-radius:8px}
.drama-btn{width:100%;text-align:left;padding:8px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;margin-bottom:2px}
.drama-btn:hover{background:var(--surface);color:var(--text)}
.drama-btn.active{background:var(--surface2);color:var(--accent2)}
.drama-btn .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.4}
.drama-btn.active .dot{opacity:1}
.drama-btn-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drama-btn-del{opacity:0;font-size:14px;color:var(--text3);border:none;background:transparent;cursor:pointer;padding:0 2px;line-height:1;transition:opacity .15s,color .15s;flex-shrink:0}
.drama-btn:hover .drama-btn-del{opacity:1}
.drama-btn-del:hover{color:#e05050}
.drama-done .dot{background:var(--text3)}

/* MAIN */
main{flex:1;overflow-y:auto;padding:2rem 2.5rem}
.no-drama{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}
.no-drama .big{font-family:'DM Serif Display',serif;font-size:48px;color:var(--border2)}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:2rem;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;font-size:14px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:11px;letter-spacing:.09em;color:var(--text3);text-transform:uppercase;margin-bottom:16px;font-weight:500}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.card-header .card-title{margin:0;flex:1}

/* FORM */
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select{padding:8px 12px;font-size:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg);color:var(--text)}
.btn{padding:9px 18px;font-size:14px;border-radius:var(--radius);background:var(--accent);color:#0f0e0c;border:none;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);opacity:1}
.btn-danger{background:#c03030;color:#fff;border:none}
.btn-danger:hover{opacity:.85}

/* BADGES */
.badge{display:inline-block;font-size:12px;padding:3px 11px;border-radius:10px;font-weight:500}
.badge.ty{background:var(--ty-bg);color:var(--ty-text)}
.badge.vy{background:var(--vy-bg);color:var(--vy-text)}
.badge.dash{background:var(--surface2);color:var(--text3)}

/* CHARS */
.chars-wrap{display:flex;flex-wrap:wrap;gap:7px;min-height:28px}
.char-tag{display:inline-flex;align-items:center;gap:5px;font-size:14px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;color:var(--text2);transition:border-color .2s}
.char-tag.pending-delete{border-color:#c03030;color:#c06060}
.del-btn{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;padding:0 1px;font-family:inherit}
.del-btn:hover{color:var(--text)}
.restore-btn{border:none;background:transparent;color:#d08040;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;font-family:inherit;font-weight:500}
.restore-btn:hover{color:#f0a060}

/* PAIRS */
.pair-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px;font-size:14px}
.pair-body{flex:1}
.pair-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.pair-row:last-child{margin-bottom:0}
.pair-arrow{color:var(--text3);font-size:11px}
.pair-note{font-size:12px;color:var(--text3);margin-top:5px}

/* SEARCH RESULT */
.result-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.5rem 1.75rem;margin-top:1.25rem}
.result-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent2);margin-bottom:14px}
.result-row{display:flex;align-items:center;gap:10px;font-size:15px;margin-bottom:8px}

/* HISTORY */
.history-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-time{font-size:12px;color:var(--text3);white-space:nowrap;min-width:110px;padding-top:1px}
.history-desc{flex:1;font-size:14px;color:var(--text2)}
.history-desc b{color:var(--text);font-weight:500}
.history-undo{font-size:12px;padding:4px 10px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.history-undo:hover{border-color:var(--accent);color:var(--accent)}

/* DRAMA STATUS toggle */
.status-row{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2)}
.status-toggle-wrap{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.status-opt{padding:6px 14px;font-size:13px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.status-opt.active{background:var(--accent);color:#0f0e0c;font-weight:500}

/* PANE */
.pane{display:none}
.pane.active{display:block}
.empty{font-size:14px;color:var(--text3);padding:4px 0}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.75rem;max-width:360px;width:90%}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);margin-bottom:8px}
.modal-text{font-size:14px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-family:'DM Serif Display',serif;font-size:14px;color:var(--text3);letter-spacing:.05em}

@media(max-width:600px){.sidebar{width:200px}main{padding:1rem}}
</style>
</head>
<body>

<div id="loading">연결 중…</div>

<header>
  <div class="logo">Baddest Females<span>Трекер обращений</span></div>
  <div class="header-right">
    <div><span class="status-dot" id="status-dot"></span><span id="status-text">подключение…</span></div>

    <div class="palette-wrap" id="palette-wrap">
      <button class="palette-btn" onclick="togglePaletteDropdown()">
        <div class="palette-btn-swatch" id="pal-swatch"></div>
        Цвет
      </button>
      <div class="palette-dropdown" id="palette-dropdown">
        <div class="palette-grid" id="palette-grid"></div>
      </div>
    </div>

    <div class="theme-toggle">
      <span class="toggle-icon">☽</span>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-chk" onchange="toggleTheme(this.checked)">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span class="toggle-icon">☀</span>
    </div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-add">
        <input id="drama-input" placeholder="Новая дорама…" onkeydown="if(event.key==='Enter')addDrama()">
        <button class="btn-sm" onclick="addDrama()">+</button>
      </div>
      <div class="sidebar-search-row">
        <input placeholder="Поиск дорам…" oninput="filterDramas(this.value)">
      </div>
    </div>

    <div class="sidebar-group" id="group-active">
      <div class="sidebar-label">
        Текущие
        <span class="sidebar-label-count" id="count-active">0</span>
      </div>
      <div id="drama-list-active"></div>
    </div>

    <div class="sidebar-group" id="group-done">
      <div class="sidebar-label">
        Завершённые
        <span class="sidebar-label-count" id="count-done">0</span>
      </div>
      <div id="drama-list-done"></div>
    </div>
  </div>

  <main>
    <div id="no-drama" class="no-drama">
      <div class="big">배디스트 피메일즈</div>
      <div>Выбери дораму слева или создай новую</div>
    </div>

    <div id="drama-view" style="display:none">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('chars',this)">Персонажи</button>
        <button class="tab" onclick="switchTab('pairs',this)">Пары</button>
        <button class="tab" onclick="switchTab('search',this)">Поиск</button>
        <button class="tab" onclick="switchTab('history',this)">История</button>
      </div>

      <!-- CHARS -->
      <div id="pane-chars" class="pane active">
        <div class="card">
          <div class="card-title">Добавить персонажа</div>
          <div class="form-row">
            <input id="char-input" placeholder="Имя персонажа" onkeydown="if(event.key==='Enter')addChar()" style="flex:1">
            <button class="btn" onclick="addChar()">Добавить</button>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Список персонажей</div>
            <input id="chars-search" placeholder="Поиск…" oninput="renderChars()" style="font-size:13px;padding:6px 10px;width:150px;flex-shrink:0">
            <select id="chars-sort" onchange="renderChars()" style="font-size:13px;padding:6px 10px;flex-shrink:0">
              <option value="date">По дате</option>
              <option value="alpha">По алфавиту</option>
            </select>
          </div>
          <div class="chars-wrap" id="chars-list"></div>
        </div>
        <div class="card">
          <div class="card-title">Статус дорамы</div>
          <div class="status-row">
            <span>Дорама</span>
            <div class="status-toggle-wrap">
              <button class="status-opt active" id="status-ongoing" onclick="setDramaStatus('ongoing')">Идёт</button>
              <button class="status-opt" id="status-done" onclick="setDramaStatus('done')">Завершена</button>
            </div>
          </div>
        </div>
      </div>

      <!-- PAIRS -->
      <div id="pane-pairs" class="pane">
        <div class="card">
          <div class="card-title">Добавить пару</div>
          <div class="form-row" style="margin-bottom:10px">
            <select id="sel-a" style="flex:1"><option value="">— от кого —</option></select>
            <select id="sel-b" style="flex:1"><option value="">— к кому —</option></select>
          </div>
          <div class="form-row" style="margin-bottom:10px">
            <span style="font-size:12px;color:var(--text3);white-space:nowrap">А → Б:</span>
            <select id="sel-speech"><option value="ты">ты</option><option value="вы">вы</option><option value="—">—</option></select>
            <span style="font-size:12px;color:var(--text3);white-space:nowrap">Б → А:</span>
            <select id="sel-speech-rev"><option value="ты">ты</option><option value="вы">вы</option><option value="—">—</option></select>
          </div>
          <div class="form-row">
            <input id="note-input" placeholder="Заметка (необязательно)" style="flex:1">
            <button class="btn" onclick="addPair()">Сохранить</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Все пары</div>
          <div id="pairs-list"></div>
        </div>
      </div>

      <!-- SEARCH -->
      <div id="pane-search" class="pane">
        <div class="card">
          <div class="card-title">Найти пару</div>
          <div class="form-row">
            <select id="find-a" onchange="renderResult()" style="flex:1"><option value="">— персонаж А —</option></select>
            <select id="find-b" onchange="renderResult()" style="flex:1"><option value="">— персонаж Б —</option></select>
          </div>
          <div id="result-area"></div>
        </div>
      </div>

      <!-- HISTORY -->
      <div id="pane-history" class="pane">
        <div class="card">
          <div class="card-title">История изменений</div>
          <div id="history-list"><div class="empty">Нет изменений</div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- confirm modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">Подтвердите действие</div>
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-danger" id="modal-confirm">Удалить</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_UhVP2DRU_jrqJD-Or3Iy8ZEIQWaAIU",
  authDomain: "bfnames.firebaseapp.com",
  databaseURL: "https://bfnames-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bfnames",
  storageBucket: "bfnames.firebasestorage.app",
  messagingSenderId: "1066954721078",
  appId: "1:1066954721078:web:fb729d5ccb8671db175597"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let state = { dramas: {}, currentDrama: null };
let dramaFilter = '';
let pendingDeletes = {}; // key -> { name, timer, pairs }

// ── STATUS ──────────────────────────────────────────────────────────────────
function setStatus(online) {
  document.getElementById('status-dot').className = 'status-dot' + (online ? ' online' : '');
  document.getElementById('status-text').textContent = online ? 'синхронизировано' : 'нет связи';
}

// ── LIVE SYNC ────────────────────────────────────────────────────────────────
onValue(ref(db, 'dramas'), snap => {
  document.getElementById('loading').style.display = 'none';
  setStatus(true);
  state.dramas = snap.val() || {};
  renderSidebar();
  if (state.currentDrama) renderCurrentDrama();
}, () => { setStatus(false); document.getElementById('loading').style.display = 'none'; });

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const q = dramaFilter.toLowerCase();
  let keys = Object.keys(state.dramas);
  if (q) keys = keys.filter(k => (state.dramas[k].name||k).toLowerCase().includes(q));
  keys.sort((a,b) => (state.dramas[a].name||a).localeCompare(state.dramas[b].name||b, 'ru'));

  const active = keys.filter(k => state.dramas[k].status !== 'done');
  const done   = keys.filter(k => state.dramas[k].status === 'done');

  document.getElementById('count-active').textContent = active.length;
  document.getElementById('count-done').textContent   = done.length;

  function renderGroup(list, containerId) {
    const el = document.getElementById(containerId);
    if (!list.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 6px">Нет дорам</div>'; return; }
    el.innerHTML = list.map(k => {
      const d = state.dramas[k];
      const isActive = state.currentDrama === k;
      const isDone   = d.status === 'done';
      return `<div style="display:flex;align-items:center">
        <button class="drama-btn${isActive?' active':''}${isDone?' drama-done':''}" onclick="selectDrama('${k}')" style="flex:1;min-width:0">
          <span class="dot"></span>
          <span class="drama-btn-name">${d.name||k}</span>
        </button>
        <button class="drama-btn-del" onclick="confirmDeleteDrama('${k}')" title="Удалить">×</button>
      </div>`;
    }).join('');
  }

  renderGroup(active, 'drama-list-active');
  renderGroup(done,   'drama-list-done');
  document.getElementById('group-done').style.display = done.length || !q ? '' : 'none';
}

window.filterDramas = v => { dramaFilter = v; renderSidebar(); };

window.addDrama = function() {
  const inp = document.getElementById('drama-input');
  const v = inp.value.trim();
  if (!v) return;
  push(ref(db,'dramas'), { name:v, chars:{}, pairs:{}, status:'ongoing' });
  inp.value = '';
};

window.selectDrama = function(id) {
  state.currentDrama = id;
  document.getElementById('no-drama').style.display = 'none';
  document.getElementById('drama-view').style.display = 'block';
  renderSidebar();
  renderCurrentDrama();
};

// ── DELETE DRAMA (with confirm modal) ────────────────────────────────────────
let modalCallback = null;
window.confirmDeleteDrama = function(id) {
  const name = (state.dramas[id]||{}).name || id;
  showModal(
    'Удалить дораму?',
    `«${name}» — все персонажи, пары и история будут удалены безвозвратно.`,
    () => {
      remove(ref(db, `dramas/${id}`));
      if (state.currentDrama === id) {
        state.currentDrama = null;
        document.getElementById('no-drama').style.display = '';
        document.getElementById('drama-view').style.display = 'none';
      }
    }
  );
};

function showModal(title, text, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent  = text;
  document.getElementById('modal-overlay').style.display = 'flex';
  modalCallback = onConfirm;
  document.getElementById('modal-confirm').onclick = () => { onConfirm(); closeModal(); };
}
window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; modalCallback = null; };

// ── CURRENT DRAMA ─────────────────────────────────────────────────────────────
function renderCurrentDrama() {
  const d = state.dramas[state.currentDrama];
  if (!d) return;
  renderChars();
  renderPairs();
  updateSelects();
  renderHistory();
  const isDone = d.status === 'done';
  document.getElementById('status-ongoing').classList.toggle('active', !isDone);
  document.getElementById('status-done').classList.toggle('active', isDone);
}

function drama()     { return state.dramas[state.currentDrama] || {}; }
function dramaPath() { return `dramas/${state.currentDrama}`; }

// ── DRAMA STATUS ──────────────────────────────────────────────────────────────
window.setDramaStatus = function(status) {
  if (!state.currentDrama) return;
  update(ref(db, dramaPath()), { status });
  logHistory(`Статус изменён на «${status === 'done' ? 'Завершена' : 'Идёт'}»`, 'status', { status });
};

// ── HISTORY ───────────────────────────────────────────────────────────────────
function logHistory(desc, type, payload) {
  if (!state.currentDrama) return;
  push(ref(db, `${dramaPath()}/history`), {
    desc, type, payload,
    ts: Date.now()
  });
}

function renderHistory() {
  const entries = Object.entries(drama().history || {});
  const w = document.getElementById('history-list');
  if (!entries.length) { w.innerHTML = '<div class="empty">Нет изменений</div>'; return; }
  const sorted = entries.sort((a,b) => b[1].ts - a[1].ts);
  w.innerHTML = sorted.map(([k, h]) => {
    const d = new Date(h.ts);
    const time = d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    let undoBtn = '';
    if (h.type === 'add_char')
      undoBtn = `<button class="history-undo" onclick="undoAddChar('${h.payload.key}','${k}')">↩ Отменить</button>`;
    else if (h.type === 'del_char')
      undoBtn = `<button class="history-undo" onclick="undoDelChar('${h.payload.key}','${h.payload.name}','${k}')">↩ Восстановить</button>`;
    else if (h.type === 'add_pair')
      undoBtn = `<button class="history-undo" onclick="undoAddPair('${h.payload.pairKey}','${k}')">↩ Отменить</button>`;
    else if (h.type === 'del_pair')
      undoBtn = `<button class="history-undo" onclick="undoDelPair('${k}')">↩ Восстановить</button>`;
    return `<div class="history-item">
      <div class="history-time">${time}</div>
      <div class="history-desc">${h.desc}</div>
      ${undoBtn}
    </div>`;
  }).join('');
}

window.undoAddChar = function(charKey, hKey) {
  remove(ref(db, `${dramaPath()}/chars/${charKey}`));
  remove(ref(db, `${dramaPath()}/history/${hKey}`));
};
window.undoDelChar = function(charKey, charName, hKey) {
  set(ref(db, `${dramaPath()}/chars/${charKey}`), charName);
  remove(ref(db, `${dramaPath()}/history/${hKey}`));
};
window.undoAddPair = function(pairKey, hKey) {
  remove(ref(db, `${dramaPath()}/pairs/${pairKey}`));
  remove(ref(db, `${dramaPath()}/history/${hKey}`));
};
window.undoDelPair = function(hKey) {
  const h = (drama().history||{})[hKey];
  if (!h) return;
  const p = h.payload;
  set(ref(db, `${dramaPath()}/pairs/${p.pairKey}`), { a:p.a, b:p.b, speech:p.speech, speechRev:p.speechRev, note:p.note||'' });
  remove(ref(db, `${dramaPath()}/history/${hKey}`));
};

// ── CHARS ─────────────────────────────────────────────────────────────────────
window.renderChars = function() {
  let chars = Object.entries(drama().chars || {});
  const q    = (document.getElementById('chars-search')?.value||'').trim().toLowerCase();
  const sort = document.getElementById('chars-sort')?.value || 'date';
  if (q) chars = chars.filter(([,v]) => v.toLowerCase().includes(q));
  if (sort === 'alpha') chars = [...chars].sort((a,b) => a[1].localeCompare(b[1],'ru'));
  const w = document.getElementById('chars-list');
  if (!chars.length) { w.innerHTML = '<span class="empty">Нет персонажей</span>'; return; }
  w.innerHTML = chars.map(([k,v]) => {
    if (pendingDeletes[k]) {
      return `<span class="char-tag pending-delete">${v}
        <button class="restore-btn" onclick="restoreChar('${k}')" title="Восстановить">↩</button>
      </span>`;
    }
    return `<span class="char-tag">${v}<button class="del-btn" onclick="removeChar('${k}')">×</button></span>`;
  }).join('');
};

function updateSelects() {
  const chars = Object.entries(drama().chars || {});
  const opts = '<option value="">— выбрать —</option>' + chars.map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
  ['sel-a','sel-b','find-a','find-b'].forEach(id => {
    const el = document.getElementById(id); if(!el) return;
    const cur = el.value; el.innerHTML = opts;
    if (chars.find(([k])=>k===cur)) el.value = cur;
  });
}

window.addChar = function() {
  const inp = document.getElementById('char-input');
  const v = inp.value.trim();
  if (!v || !state.currentDrama) return;
  const r = push(ref(db, `${dramaPath()}/chars`));
  set(r, v);
  logHistory(`Добавлен персонаж <b>${v}</b>`, 'add_char', { key: r.key, name: v });
  inp.value = '';
};

window.removeChar = function(key) {
  const name = drama().chars?.[key];
  if (!name) return;
  const el = document.querySelector(`.char-tag:has(button[onclick="removeChar('${key}')"])`);
  if (el) el.classList.add('pending-delete');
  renderChars();
  const timer = setTimeout(() => {
    const pairsSnap = drama().pairs || {};
    const affectedPairs = Object.entries(pairsSnap).filter(([,p]) => p.a===key||p.b===key);
    remove(ref(db, `${dramaPath()}/chars/${key}`));
    affectedPairs.forEach(([pk]) => remove(ref(db, `${dramaPath()}/pairs/${pk}`)));
    logHistory(`Удалён персонаж <b>${name}</b>`, 'del_char', { key, name });
    delete pendingDeletes[key];
    renderChars();
  }, 5000);
  pendingDeletes[key] = { name, timer };
};

window.restoreChar = function(key) {
  if (!pendingDeletes[key]) return;
  clearTimeout(pendingDeletes[key].timer);
  delete pendingDeletes[key];
  renderChars();
};

// ── PAIRS ─────────────────────────────────────────────────────────────────────
function badge(s) {
  const cls = s==='ты'?'ty':s==='вы'?'vy':'dash';
  return `<span class="badge ${cls}">${s}</span>`;
}
function charName(key) { return (drama().chars||{})[key]||key; }

function renderPairs() {
  const pairs = Object.entries(drama().pairs || {});
  const w = document.getElementById('pairs-list');
  if (!pairs.length) { w.innerHTML = '<div class="empty">Нет пар</div>'; return; }
  w.innerHTML = pairs.map(([k,p]) => `
    <div class="pair-item">
      <div class="pair-body">
        <div class="pair-row">${charName(p.a)}<span class="pair-arrow">→</span>${charName(p.b)}: ${badge(p.speech)}</div>
        <div class="pair-row">${charName(p.b)}<span class="pair-arrow">→</span>${charName(p.a)}: ${badge(p.speechRev)}</div>
        ${p.note?`<div class="pair-note">${p.note}</div>`:''}
      </div>
      <button class="del-btn" onclick="removePair('${k}')">×</button>
    </div>`).join('');
}

window.addPair = function() {
  const a  = document.getElementById('sel-a').value;
  const b  = document.getElementById('sel-b').value;
  if (!a||!b||a===b) { alert('Выбери двух разных персонажей'); return; }
  const s  = document.getElementById('sel-speech').value;
  const sr = document.getElementById('sel-speech-rev').value;
  const note = document.getElementById('note-input').value.trim();
  const pairs = drama().pairs || {};
  Object.entries(pairs).forEach(([k,p]) => {
    if ((p.a===a&&p.b===b)||(p.a===b&&p.b===a)) remove(ref(db,`${dramaPath()}/pairs/${k}`));
  });
  const r = push(ref(db, `${dramaPath()}/pairs`));
  set(r, { a, b, speech:s, speechRev:sr, note });
  logHistory(`Добавлена пара <b>${charName(a)}</b> — <b>${charName(b)}</b> (${s} / ${sr})`, 'add_pair', { pairKey:r.key, a, b, speech:s, speechRev:sr, note });
  document.getElementById('note-input').value = '';
};

window.removePair = function(key) {
  const p = (drama().pairs||{})[key]; if(!p) return;
  logHistory(`Удалена пара <b>${charName(p.a)}</b> — <b>${charName(p.b)}</b>`, 'del_pair',
    { pairKey:key, a:p.a, b:p.b, speech:p.speech, speechRev:p.speechRev, note:p.note||'' });
  remove(ref(db, `${dramaPath()}/pairs/${key}`));
};

// ── SEARCH ────────────────────────────────────────────────────────────────────
window.renderResult = function() {
  const ak = document.getElementById('find-a').value;
  const bk = document.getElementById('find-b').value;
  const ra = document.getElementById('result-area');
  if (!ak||!bk) { ra.innerHTML=''; return; }
  if (ak===bk) { ra.innerHTML='<div class="empty" style="margin-top:8px">Выбери разных персонажей</div>'; return; }
  const pairs = Object.values(drama().pairs||{});
  const p = pairs.find(x=>(x.a===ak&&x.b===bk)||(x.a===bk&&x.b===ak));
  if (!p) { ra.innerHTML='<div class="result-card"><div class="empty">Пара не найдена</div></div>'; return; }
  const fwd = p.a===ak?{s:p.speech,r:p.speechRev}:{s:p.speechRev,r:p.speech};
  const an=charName(ak), bn=charName(bk);
  ra.innerHTML=`<div class="result-card">
    <div class="result-title">${an} — ${bn}</div>
    <div class="result-row">${an}<span style="color:var(--text3)">→</span>${bn}: ${badge(fwd.s)}</div>
    <div class="result-row">${bn}<span style="color:var(--text3)">→</span>${an}: ${badge(fwd.r)}</div>
    ${p.note?`<div style="font-size:13px;color:var(--text3);margin-top:8px">${p.note}</div>`:''}
  </div>`;
};

// ── TABS ──────────────────────────────────────────────────────────────────────
window.switchTab = function(t, btn) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+t).classList.add('active');
  if (t==='history') renderHistory();
};

// ── PALETTE ───────────────────────────────────────────────────────────────────
const PALETTES = [
  { id:'',       color:'#d4a853', label:'Янтарь'  },
  { id:'sakura', color:'#e8739a', label:'Сакура'  },
  { id:'ocean',  color:'#3d9cf0', label:'Океан'   },
  { id:'forest', color:'#4ec068', label:'Лес'     },
  { id:'violet', color:'#a060f0', label:'Фиолет'  },
  { id:'rose',   color:'#f05840', label:'Алый'    },
  { id:'slate',  color:'#6888d0', label:'Сталь'   },
  { id:'copper', color:'#c87840', label:'Медь'    },
];

function buildPaletteGrid() {
  const grid = document.getElementById('palette-grid');
  const saved = localStorage.getItem('dc_palette') || '';
  grid.innerHTML = PALETTES.map(p => `
    <div class="pal-item" onclick="setPalette('${p.id}')">
      <div class="pal-dot${p.id===saved?' active':''}" style="background:${p.color}" data-pal="${p.id}"></div>
      <div class="pal-dot-label">${p.label}</div>
    </div>`).join('');
  updateSwatchColor();
}

function updateSwatchColor() {
  const saved = localStorage.getItem('dc_palette') || '';
  const pal = PALETTES.find(p=>p.id===saved) || PALETTES[0];
  document.getElementById('pal-swatch').style.background = pal.color;
}

window.setPalette = function(pal) {
  PALETTES.forEach(p => document.body.classList.remove('palette-'+p.id));
  if (pal) document.body.classList.add('palette-'+pal);
  localStorage.setItem('dc_palette', pal);
  document.querySelectorAll('.pal-dot').forEach(d => d.classList.toggle('active', d.dataset.pal===pal));
  updateSwatchColor();
  document.getElementById('palette-dropdown').classList.remove('open');
};

window.togglePaletteDropdown = function() {
  document.getElementById('palette-dropdown').classList.toggle('open');
};

// close dropdown on outside click
document.addEventListener('click', e => {
  if (!document.getElementById('palette-wrap').contains(e.target))
    document.getElementById('palette-dropdown').classList.remove('open');
});

// ── THEME ─────────────────────────────────────────────────────────────────────
window.toggleTheme = function(isLight) {
  document.body.classList.toggle('light', isLight);
  localStorage.setItem('dc_theme', isLight?'light':'dark');
};

// ── INIT ──────────────────────────────────────────────────────────────────────
(function(){
  const pal = localStorage.getItem('dc_palette')||'';
  if (pal) document.body.classList.add('palette-'+pal);
  if (localStorage.getItem('dc_theme')==='light') {
    document.body.classList.add('light');
    const chk = document.getElementById('theme-chk');
    if (chk) chk.checked = true;
  }
  buildPaletteGrid();
})();
</script>
</body>
</html>
