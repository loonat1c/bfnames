<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baddest Females - Трекер обращений</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111009;
    --surface: #1c1b18;
    --surface2: #262420;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.16);
    --text: #f2ede4;
    --text2: #b0aa9f;
    --text3: #6a6560;
    --accent: #d4a853;
    --accent2: #f0d898;
    --ty-bg: #0b2016;
    --ty-text: #3dd68c;
    --vy-bg: #0b1830;
    --vy-text: #5ba8f5;
    --radius: 10px;
    --radius-lg: 14px;
  }
  body.light {
    --bg: #f2efe8;
    --surface: #ffffff;
    --surface2: #e8e4da;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #18160f;
    --text2: #4a4640;
    --text3: #8a857c;
    --accent: #8c5e18;
    --accent2: #5c3c08;
    --ty-bg: #d4f5e4;
    --ty-text: #145c38;
    --vy-bg: #d4e8fc;
    --vy-text: #0f3d82;
  }
  /* ── COLOR PALETTES ── */
  body.palette-sakura {
    --bg: #1a0f14; --surface: #261520; --surface2: #32202b;
    --border: rgba(255,200,220,0.09); --border2: rgba(255,200,220,0.16);
    --text: #f5e6ed; --text2: #c4a0b4; --text3: #7a5068;
    --accent: #e8739a; --accent2: #f5b8cf;
    --ty-bg: #1a2618; --ty-text: #5dd68a;
    --vy-bg: #1a1030; --vy-text: #8baaf5;
  }
  body.palette-sakura.light {
    --bg: #fdf0f5; --surface: #ffffff; --surface2: #f5e0ec;
    --border: rgba(180,60,100,0.10); --border2: rgba(180,60,100,0.18);
    --text: #2a0f1c; --text2: #7a3058; --text3: #b87898;
    --accent: #c0305a; --accent2: #8a1a38;
    --ty-bg: #d8f5e4; --ty-text: #0f5c30;
    --vy-bg: #dce8fd; --vy-text: #0f3882;
  }
  body.palette-ocean {
    --bg: #080e18; --surface: #101828; --surface2: #182030;
    --border: rgba(80,160,255,0.09); --border2: rgba(80,160,255,0.16);
    --text: #e0eeff; --text2: #8ab0d8; --text3: #4a7098;
    --accent: #3d9cf0; --accent2: #90ccff;
    --ty-bg: #0b2018; --ty-text: #3dd68c;
    --vy-bg: #0b1830; --vy-text: #5ba8f5;
  }
  body.palette-ocean.light {
    --bg: #eef4fc; --surface: #ffffff; --surface2: #daeaf8;
    --border: rgba(20,80,160,0.10); --border2: rgba(20,80,160,0.18);
    --text: #081428; --text2: #1a4878; --text3: #5888b8;
    --accent: #0a5abf; --accent2: #063a88;
    --ty-bg: #d4f5e6; --ty-text: #0a5030;
    --vy-bg: #d4e8fc; --vy-text: #0f3d82;
  }
  body.palette-forest {
    --bg: #080f0a; --surface: #101a12; --surface2: #182418;
    --border: rgba(80,200,100,0.09); --border2: rgba(80,200,100,0.15);
    --text: #e2f0e4; --text2: #88b890; --text3: #486850;
    --accent: #4ec068; --accent2: #a0e0a8;
    --ty-bg: #0b2014; --ty-text: #3dd88a;
    --vy-bg: #0b1a30; --vy-text: #60a8f8;
  }
  body.palette-forest.light {
    --bg: #eef6ee; --surface: #ffffff; --surface2: #daeeda;
    --border: rgba(20,100,40,0.10); --border2: rgba(20,100,40,0.18);
    --text: #081408; --text2: #1a5828; --text3: #508860;
    --accent: #1a7030; --accent2: #0a4820;
    --ty-bg: #d4f5e2; --ty-text: #0a5028;
    --vy-bg: #d4e6fc; --vy-text: #0f3882;
  }
  body.palette-violet {
    --bg: #0e080f; --surface: #181020; --surface2: #22182e;
    --border: rgba(160,100,255,0.09); --border2: rgba(160,100,255,0.16);
    --text: #f0e8ff; --text2: #b090d8; --text3: #705090;
    --accent: #a060f0; --accent2: #d0a8ff;
    --ty-bg: #0b2018; --ty-text: #3dd68c;
    --vy-bg: #180b30; --vy-text: #9878f8;
  }
  body.palette-violet.light {
    --bg: #f4f0fc; --surface: #ffffff; --surface2: #ece4f8;
    --border: rgba(80,20,160,0.10); --border2: rgba(80,20,160,0.18);
    --text: #180828; --text2: #501888; --text3: #9068b8;
    --accent: #6020c0; --accent2: #3a0890;
    --ty-bg: #d8f5e4; --ty-text: #0f5c30;
    --vy-bg: #e4d8fc; --vy-text: #4010a0;
  }
  body.palette-sand {
    --bg: #13100a; --surface: #1e1a12; --surface2: #2a241a;
    --border: rgba(200,170,100,0.09); --border2: rgba(200,170,100,0.16);
    --text: #f5f0e4; --text2: #c8b880; --text3: #806848;
    --accent: #d4a040; --accent2: #f0d090;
    --ty-bg: #0c2016; --ty-text: #40d888;
    --vy-bg: #0c1830; --vy-text: #60a8f8;
  }
  body.palette-sand.light {
    --bg: #faf6ec; --surface: #ffffff; --surface2: #f0e8d0;
    --border: rgba(120,80,20,0.10); --border2: rgba(120,80,20,0.18);
    --text: #201408; --text2: #6a4810; --text3: #a88050;
    --accent: #9a6010; --accent2: #6a3e08;
    --ty-bg: #d8f5e4; --ty-text: #0f5c30;
    --vy-bg: #d8e8fc; --vy-text: #0f3882;
  }

  /* PALETTE PICKER */
  .palette-picker { display: flex; align-items: center; gap: 6px; }
  .pal-dot {
    width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform .15s, border-color .15s;
    flex-shrink: 0;
  }
  .pal-dot:hover { transform: scale(1.2); }
  .pal-dot.active { border-color: var(--text); transform: scale(1.15); }

  .theme-toggle { display: flex; align-items: center; gap: 8px; }
  .toggle-switch { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle-switch input { display: none; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; transition: background .2s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--text3); transition: transform .2s, background .2s;
  }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(16px); background: #fff; }
  .toggle-icon { font-size: 14px; color: var(--text2); user-select: none; }
  body.light .status-dot { background: #c8c0b4; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-weight: 300;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .02em;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 14px; margin-left: 8px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #3a3835; display: inline-block; margin-right: 6px;
    transition: background .3s;
  }
  .status-dot.online { background: var(--ty-text); }
  #status-text { font-size: 13px; color: var(--text3); }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-section { padding: 1rem 1rem 0.75rem; }
  .sidebar-label {
    font-size: 11px;
    letter-spacing: .09em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
    padding: 0 4px;
  }
  .drama-btn {
    width: 100%;
    text-align: left;
    padding: 9px 12px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drama-btn:hover { background: var(--surface); color: var(--text); }
  .drama-btn.active { background: var(--surface2); color: var(--accent2); }
  .drama-btn .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; opacity: .5; }
  .drama-btn.active .dot { opacity: 1; }
  .add-drama-row {
    display: flex; gap: 6px; padding: 1rem 1rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search {
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%; font-size: 13px; padding: 7px 10px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text); outline: none;
    font-family: 'DM Sans', sans-serif;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .add-drama-row input {
    flex: 1; font-size: 13px; padding: 7px 10px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text); outline: none;
    font-family: 'DM Sans', sans-serif;
  }
  .add-drama-row input:focus { border-color: var(--accent); }
  .btn-sm {
    padding: 7px 12px; font-size: 13px; border-radius: 8px;
    background: var(--accent); color: #0f0e0c; border: none;
    cursor: pointer; font-weight: 500; flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .15s;
  }
  .btn-sm:hover { opacity: .85; }

  /* MAIN */
  main { flex: 1; overflow-y: auto; padding: 2rem 2.5rem; }
  .no-drama {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--text3);
    gap: 12px;
  }
  .no-drama .big { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--border2); }

  /* TABS */
  .tabs { display: flex; gap: 2px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 18px; font-size: 14px; border: none; background: transparent;
    color: var(--text3); cursor: pointer; font-family: 'DM Sans', sans-serif;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem;
  }
  .card-title { font-size: 11px; letter-spacing: .09em; color: var(--text3); text-transform: uppercase; margin-bottom: 16px; font-weight: 500; }

  /* FORM */
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input, select {
    padding: 8px 12px; font-size: 14px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text); outline: none;
    font-family: 'DM Sans', sans-serif; transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--bg); color: var(--text); }
  .btn {
    padding: 9px 18px; font-size: 14px; border-radius: var(--radius);
    background: var(--accent); color: #0f0e0c; border: none;
    cursor: pointer; font-weight: 500;
    font-family: 'DM Sans', sans-serif; transition: opacity .15s; white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn-ghost {
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); opacity: 1; }

  /* BADGES */
  .badge {
    display: inline-block; font-size: 12px; padding: 3px 11px;
    border-radius: 10px; font-weight: 500;
  }
  .badge.ty { background: var(--ty-bg); color: var(--ty-text); }
  .badge.vy { background: var(--vy-bg); color: var(--vy-text); }
  .badge.dash { background: var(--surface2); color: var(--text3); }

  /* CHARS */
  .chars-wrap { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
  .char-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 14px; padding: 5px 12px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 20px; color: var(--text2);
  }
  .del-btn {
    border: none; background: transparent; color: var(--text3);
    cursor: pointer; font-size: 15px; line-height: 1; padding: 0 1px;
    font-family: inherit;
  }
  .del-btn:hover { color: var(--text); }

  /* PAIRS LIST */
  .pair-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--surface2);
    border-radius: var(--radius); margin-bottom: 8px; font-size: 14px;
  }
  .pair-body { flex: 1; }
  .pair-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .pair-row:last-child { margin-bottom: 0; }
  .pair-arrow { color: var(--text3); font-size: 11px; }
  .pair-note { font-size: 12px; color: var(--text3); margin-top: 5px; }

  /* SEARCH RESULT */
  .result-card {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 1.5rem 1.75rem; margin-top: 1.25rem;
  }
  .result-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent2); margin-bottom: 14px; }
  .result-row { display: flex; align-items: center; gap: 10px; font-size: 15px; margin-bottom: 8px; }

  /* PANE */
  .pane { display: none; }
  .pane.active { display: block; }

  .empty { font-size: 14px; color: var(--text3); padding: 4px 0; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; font-family: 'DM Serif Display', serif;
    font-size: 14px; color: var(--text3); letter-spacing: .05em;
  }

  @media (max-width: 600px) {
    .sidebar { width: 160px; }
    main { padding: 1rem; }
  }
</style>
</head>
<body>

<div id="loading">연결 중…</div>

<header>
  <div class="logo">Baddest Females</div>
  <div style="display:flex;align-items:center;gap:16px">
    <div><span class="status-dot" id="status-dot"></span><span id="status-text">подключение…</span></div>
    <div class="palette-picker" id="palette-picker">
      <div class="pal-dot active" style="background:#d4a853" data-pal="" title="Янтарь" onclick="setPalette('')"></div>
      <div class="pal-dot" style="background:#e8739a" data-pal="sakura" title="Сакура" onclick="setPalette('sakura')"></div>
      <div class="pal-dot" style="background:#3d9cf0" data-pal="ocean" title="Океан" onclick="setPalette('ocean')"></div>
      <div class="pal-dot" style="background:#4ec068" data-pal="forest" title="Лес" onclick="setPalette('forest')"></div>
      <div class="pal-dot" style="background:#a060f0" data-pal="violet" title="Фиолет" onclick="setPalette('violet')"></div>
      <div class="pal-dot" style="background:#d4a040" data-pal="sand" title="Песок" onclick="setPalette('sand')"></div>
    </div>
    <div class="theme-toggle">
      <span class="toggle-icon">☽</span>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-chk" onchange="toggleTheme(this.checked)">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span class="toggle-icon">☀</span>
    </div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="add-drama-row">
      <input id="drama-input" placeholder="Новая дорама…" onkeydown="if(event.key==='Enter')addDrama()">
      <button class="btn-sm" onclick="addDrama()">+</button>
    </div>
    <div class="sidebar-search">
      <input id="drama-search" placeholder="Поиск…" oninput="filterDramas(this.value)">
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Дорамы</div>
      <div id="drama-list"></div>
    </div>
  </div>

  <main>
    <div id="no-drama" class="no-drama">
      <div class="big">배디스트 피메일즈</div>
      <div>Выбери дораму слева или создай новую</div>
    </div>

    <div id="drama-view" style="display:none">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('chars',this)">Персонажи</button>
        <button class="tab" onclick="switchTab('pairs',this)">Пары</button>
        <button class="tab" onclick="switchTab('search',this)">Поиск</button>
      </div>

      <!-- CHARS -->
      <div id="pane-chars" class="pane active">
        <div class="card">
          <div class="card-title">Добавить персонажа</div>
          <div class="form-row">
            <input id="char-input" placeholder="Имя персонажа" onkeydown="if(event.key==='Enter')addChar()" style="flex:1">
            <button class="btn" onclick="addChar()">Добавить</button>
          </div>
        </div>
        <div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
            <div class="card-title" style="margin:0;flex:1">Список персонажей</div>
            <input id="chars-search" placeholder="Поиск…" oninput="renderChars()" style="font-size:13px;padding:5px 10px;width:160px;flex-shrink:0">
            <select id="chars-sort" onchange="renderChars()" style="font-size:13px;padding:5px 10px;flex-shrink:0">
              <option value="date">По дате</option>
              <option value="alpha">По алфавиту</option>
            </select>
          </div>
          <div class="chars-wrap" id="chars-list"></div>
        </div>
      </div>

      <!-- PAIRS -->
      <div id="pane-pairs" class="pane">
        <div class="card">
          <div class="card-title">Добавить пару</div>
          <div class="form-row" style="margin-bottom:10px">
            <select id="sel-a" style="flex:1"><option value="">— от кого —</option></select>
            <select id="sel-b" style="flex:1"><option value="">— к кому —</option></select>
          </div>
          <div class="form-row" style="margin-bottom:10px">
            <span style="font-size:12px;color:var(--text3);white-space:nowrap">А → Б:</span>
            <select id="sel-speech"><option value="ты">ты</option><option value="вы">вы</option><option value="—">—</option></select>
            <span style="font-size:12px;color:var(--text3);white-space:nowrap">Б → А:</span>
            <select id="sel-speech-rev"><option value="ты">ты</option><option value="вы">вы</option><option value="—">—</option></select>
          </div>
          <div class="form-row">
            <input id="note-input" placeholder="Заметка (необязательно)" style="flex:1">
            <button class="btn" onclick="addPair()">Сохранить</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Все пары</div>
          <div id="pairs-list"></div>
        </div>
      </div>

      <!-- SEARCH -->
      <div id="pane-search" class="pane">
        <div class="card">
          <div class="card-title">Найти пару</div>
          <div class="form-row">
            <select id="find-a" onchange="renderResult()" style="flex:1"><option value="">— персонаж А —</option></select>
            <select id="find-b" onchange="renderResult()" style="flex:1"><option value="">— персонаж Б —</option></select>
          </div>
          <div id="result-area"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Firebase SDKs -->

  authDomain: "bfnames.firebaseapp.com",
  databaseURL: "https://bfnames-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bfnames",
  storageBucket: "bfnames.firebasestorage.app",
  messagingSenderId: "1066954721078",
  appId: "1:1066954721078:web:fb729d5ccb8671db175597"
};
// =============================================

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let state = { dramas: {}, currentDrama: null };

// Status
function setStatus(online) {
  document.getElementById('status-dot').className = 'status-dot' + (online ? ' online' : '');
  document.getElementById('status-text').textContent = online ? 'синхронизировано' : 'нет связи';
}

// Live sync
const dbRef = ref(db, 'dramas');
onValue(dbRef, snap => {
  document.getElementById('loading').style.display = 'none';
  setStatus(true);
  state.dramas = snap.val() || {};
  renderSidebar();
  if (state.currentDrama) renderCurrentDrama();
}, err => { setStatus(false); document.getElementById('loading').style.display = 'none'; });

// ---- SIDEBAR ----
let dramaFilter = '';

function renderSidebar() {
  const list = document.getElementById('drama-list');
  const keys = Object.keys(state.dramas);
  const filtered = keys.filter(k => {
    const name = (state.dramas[k].name || k).toLowerCase();
    return name.includes(dramaFilter.toLowerCase());
  });
  if (!keys.length) { list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 4px">Нет дорам</div>'; return; }
  if (!filtered.length) { list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 4px">Ничего не найдено</div>'; return; }
  list.innerHTML = filtered.map(k => {
    const d = state.dramas[k];
    const active = state.currentDrama === k ? ' active' : '';
    return `<button class="drama-btn${active}" onclick="selectDrama('${k}')">
      <span class="dot"></span>${d.name || k}
    </button>`;
  }).join('');
}

window.filterDramas = function(val) {
  dramaFilter = val;
  renderSidebar();
};

window.addDrama = function() {
  const inp = document.getElementById('drama-input');
  const v = inp.value.trim();
  if (!v) return;
  const newRef = push(ref(db, 'dramas'));
  set(newRef, { name: v, chars: {}, pairs: {} });
  inp.value = '';
};

window.selectDrama = function(id) {
  state.currentDrama = id;
  document.getElementById('no-drama').style.display = 'none';
  document.getElementById('drama-view').style.display = 'block';
  renderSidebar();
  renderCurrentDrama();
};

// ---- CURRENT DRAMA ----
function renderCurrentDrama() {
  const d = state.dramas[state.currentDrama];
  if (!d) return;
  renderChars();
  renderPairs();
  updateSelects();
}

function drama() { return state.dramas[state.currentDrama] || {}; }
function dramaPath() { return `dramas/${state.currentDrama}`; }

// ---- CHARS ----
function renderChars() {
  let chars = Object.entries(drama().chars || {});
  const searchEl = document.getElementById('chars-search');
  const sortEl = document.getElementById('chars-sort');
  const q = searchEl ? searchEl.value.trim().toLowerCase() : '';
  const sort = sortEl ? sortEl.value : 'date';
  if (q) chars = chars.filter(([k, v]) => v.toLowerCase().includes(q));
  if (sort === 'alpha') chars = [...chars].sort((a, b) => a[1].localeCompare(b[1], 'ru'));
  const w = document.getElementById('chars-list');
  w.innerHTML = chars.length
    ? chars.map(([k, v]) => `<span class="char-tag">${v}<button class="del-btn" onclick="removeChar('${k}')">×</button></span>`).join('')
    : '<span class="empty">Нет персонажей</span>';
}

function updateSelects() {
  const chars = Object.entries(drama().chars || {});
  const opts = '<option value="">— выбрать —</option>' + chars.map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
  ['sel-a','sel-b','find-a','find-b'].forEach(id => {
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = opts;
    if (chars.find(([k])=>k===cur)) el.value = cur;
  });
}

window.addChar = function() {
  const inp = document.getElementById('char-input');
  const v = inp.value.trim();
  if (!v || !state.currentDrama) return;
  const newRef = push(ref(db, `${dramaPath()}/chars`));
  set(newRef, v);
  inp.value = '';
};

window.removeChar = function(key) {
  remove(ref(db, `${dramaPath()}/chars/${key}`));
  const pairs = drama().pairs || {};
  Object.keys(pairs).forEach(pk => {
    const p = pairs[pk];
    if (p.a === key || p.b === key) remove(ref(db, `${dramaPath()}/pairs/${pk}`));
  });
};

// ---- PAIRS ----
function badge(s) {
  const cls = s === 'ты' ? 'ty' : s === 'вы' ? 'vy' : 'dash';
  return `<span class="badge ${cls}">${s}</span>`;
}

function charName(key) {
  return (drama().chars || {})[key] || key;
}

function renderPairs() {
  const pairs = Object.entries(drama().pairs || {});
  const w = document.getElementById('pairs-list');
  if (!pairs.length) { w.innerHTML = '<div class="empty">Нет пар</div>'; return; }
  w.innerHTML = pairs.map(([k, p]) => `
    <div class="pair-item">
      <div class="pair-body">
        <div class="pair-row">${charName(p.a)}<span class="pair-arrow">→</span>${charName(p.b)}: ${badge(p.speech)}</div>
        <div class="pair-row">${charName(p.b)}<span class="pair-arrow">→</span>${charName(p.a)}: ${badge(p.speechRev)}</div>
        ${p.note ? `<div class="pair-note">${p.note}</div>` : ''}
      </div>
      <button class="del-btn" onclick="removePair('${k}')">×</button>
    </div>`).join('');
}

window.addPair = function() {
  const a = document.getElementById('sel-a').value;
  const b = document.getElementById('sel-b').value;
  if (!a || !b || a === b) { alert('Выбери двух разных персонажей'); return; }
  const s = document.getElementById('sel-speech').value;
  const sr = document.getElementById('sel-speech-rev').value;
  const note = document.getElementById('note-input').value.trim();
  const pairs = drama().pairs || {};
  // удалить дубли
  Object.entries(pairs).forEach(([k, p]) => {
    if ((p.a === a && p.b === b) || (p.a === b && p.b === a)) remove(ref(db, `${dramaPath()}/pairs/${k}`));
  });
  push(ref(db, `${dramaPath()}/pairs`), { a, b, speech: s, speechRev: sr, note });
  document.getElementById('note-input').value = '';
};

window.removePair = function(key) {
  remove(ref(db, `${dramaPath()}/pairs/${key}`));
};

// ---- SEARCH ----
window.renderResult = function() {
  const ak = document.getElementById('find-a').value;
  const bk = document.getElementById('find-b').value;
  const ra = document.getElementById('result-area');
  if (!ak || !bk) { ra.innerHTML = ''; return; }
  if (ak === bk) { ra.innerHTML = '<div class="empty" style="margin-top:8px">Выбери разных персонажей</div>'; return; }
  const pairs = Object.values(drama().pairs || {});
  const p = pairs.find(x => (x.a === ak && x.b === bk) || (x.a === bk && x.b === ak));
  if (!p) { ra.innerHTML = '<div class="result-card"><div class="empty">Пара не найдена</div></div>'; return; }
  const fwd = p.a === ak ? { s: p.speech, r: p.speechRev } : { s: p.speechRev, r: p.speech };
  const an = charName(ak), bn = charName(bk);
  ra.innerHTML = `<div class="result-card">
    <div class="result-title">${an} — ${bn}</div>
    <div class="result-row">${an} <span style="color:var(--text3)">→</span> ${bn}: ${badge(fwd.s)}</div>
    <div class="result-row">${bn} <span style="color:var(--text3)">→</span> ${an}: ${badge(fwd.r)}</div>
    ${p.note ? `<div style="font-size:13px;color:var(--text3);margin-top:8px">${p.note}</div>` : ''}
  </div>`;
};

// ---- THEME ----
const PALETTES = ['', 'sakura', 'ocean', 'forest', 'violet', 'sand'];

window.setPalette = function(pal) {
  PALETTES.forEach(p => document.body.classList.remove('palette-' + p));
  if (pal) document.body.classList.add('palette-' + pal);
  localStorage.setItem('dc_palette', pal);
  document.querySelectorAll('.pal-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.pal === pal);
  });
};

window.toggleTheme = function(isLight) {
  document.body.classList.toggle('light', isLight);
  localStorage.setItem('dc_theme', isLight ? 'light' : 'dark');
};

(function(){
  const savedPal = localStorage.getItem('dc_palette') || '';
  if (savedPal) document.body.classList.add('palette-' + savedPal);
  document.querySelectorAll('.pal-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.pal === savedPal);
  });
  const saved = localStorage.getItem('dc_theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    const chk = document.getElementById('theme-chk');
    if (chk) chk.checked = true;
  }
})();

// ---- TABS ----
window.switchTab = function(t, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + t).classList.add('active');
};
</script>
</body>
</html>
