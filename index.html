<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Baddest Females</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── PALETTES ──────────────────────────────────────────────────────────────── */
:root{
  --bg:#111009;--surface:#1c1b18;--surface2:#262420;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.16);
  --text:#f2ede4;--text2:#b0aa9f;--text3:#6a6560;
  --accent:#d4a853;--accent2:#f0d898;--accent-rgb:212,168,83;
  --ty-bg:#0b2016;--ty-text:#3dd68c;
  --vy-bg:#0b1830;--vy-text:#5ba8f5;
  --new-glow:rgba(212,168,83,.45);
  --radius:12px;--radius-lg:16px;--sidebar-w:300px;
}
body.light{--bg:#f2efe8;--surface:#fff;--surface2:#e8e4da;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);--text:#18160f;--text2:#4a4640;--text3:#8a857c;--accent:#8c5e18;--accent2:#5c3c08;--accent-rgb:140,94,24;--new-glow:rgba(140,94,24,.4);--ty-bg:#d4f5e4;--ty-text:#145c38;--vy-bg:#d4e8fc;--vy-text:#0f3d82}

body.palette-sakura{--bg:#1a0f14;--surface:#261520;--surface2:#32202b;--border:rgba(255,200,220,.09);--border2:rgba(255,200,220,.16);--text:#f5e6ed;--text2:#c4a0b4;--text3:#7a5068;--accent:#e8739a;--accent2:#f5b8cf;--accent-rgb:232,115,154;--new-glow:rgba(232,115,154,.4);--ty-bg:#1a2618;--ty-text:#5dd68a;--vy-bg:#1a1030;--vy-text:#8baaf5}
body.palette-sakura.light{--bg:#fdf0f5;--surface:#fff;--surface2:#f5e0ec;--border:rgba(180,60,100,.10);--border2:rgba(180,60,100,.18);--text:#2a0f1c;--text2:#7a3058;--text3:#b87898;--accent:#c0305a;--accent2:#8a1a38;--accent-rgb:192,48,90;--new-glow:rgba(192,48,90,.4);--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#dce8fd;--vy-text:#0f3882}

body.palette-ocean{--bg:#080e18;--surface:#101828;--surface2:#182030;--border:rgba(80,160,255,.09);--border2:rgba(80,160,255,.16);--text:#e0eeff;--text2:#8ab0d8;--text3:#4a7098;--accent:#3d9cf0;--accent2:#90ccff;--accent-rgb:61,156,240;--new-glow:rgba(61,156,240,.4);--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#0b1830;--vy-text:#5ba8f5}
body.palette-ocean.light{--bg:#eef4fc;--surface:#fff;--surface2:#daeaf8;--border:rgba(20,80,160,.10);--border2:rgba(20,80,160,.18);--text:#081428;--text2:#1a4878;--text3:#5888b8;--accent:#0a5abf;--accent2:#063a88;--accent-rgb:10,90,191;--new-glow:rgba(10,90,191,.4);--ty-bg:#d4f5e6;--ty-text:#0a5030;--vy-bg:#d4e8fc;--vy-text:#0f3d82}

body.palette-forest{--bg:#080f0a;--surface:#101a12;--surface2:#182418;--border:rgba(80,200,100,.09);--border2:rgba(80,200,100,.15);--text:#e2f0e4;--text2:#88b890;--text3:#486850;--accent:#4ec068;--accent2:#a0e0a8;--accent-rgb:78,192,104;--new-glow:rgba(78,192,104,.4);--ty-bg:#0b2014;--ty-text:#3dd88a;--vy-bg:#0b1a30;--vy-text:#60a8f8}
body.palette-forest.light{--bg:#eef6ee;--surface:#fff;--surface2:#daeeda;--border:rgba(20,100,40,.10);--border2:rgba(20,100,40,.18);--text:#081408;--text2:#1a5828;--text3:#508860;--accent:#1a7030;--accent2:#0a4820;--accent-rgb:26,112,48;--new-glow:rgba(26,112,48,.4);--ty-bg:#d4f5e2;--ty-text:#0a5028;--vy-bg:#d4e6fc;--vy-text:#0f3882}

body.palette-violet{--bg:#0e080f;--surface:#181020;--surface2:#22182e;--border:rgba(160,100,255,.09);--border2:rgba(160,100,255,.16);--text:#f0e8ff;--text2:#b090d8;--text3:#705090;--accent:#a060f0;--accent2:#d0a8ff;--accent-rgb:160,96,240;--new-glow:rgba(160,96,240,.4);--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#180b30;--vy-text:#9878f8}
body.palette-violet.light{--bg:#f4f0fc;--surface:#fff;--surface2:#ece4f8;--border:rgba(80,20,160,.10);--border2:rgba(80,20,160,.18);--text:#180828;--text2:#501888;--text3:#9068b8;--accent:#6020c0;--accent2:#3a0890;--accent-rgb:96,32,192;--new-glow:rgba(96,32,192,.4);--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#e4d8fc;--vy-text:#4010a0}

body.palette-rose{--bg:#140a0a;--surface:#201010;--surface2:#2c1818;--border:rgba(255,120,100,.09);--border2:rgba(255,120,100,.16);--text:#fff0ee;--text2:#d8a090;--text3:#885850;--accent:#f05840;--accent2:#ffb0a0;--accent-rgb:240,88,64;--new-glow:rgba(240,88,64,.4);--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#0b1830;--vy-text:#5ba8f5}
body.palette-rose.light{--bg:#fdf2f0;--surface:#fff;--surface2:#f8e0dc;--border:rgba(180,40,20,.10);--border2:rgba(180,40,20,.18);--text:#280808;--text2:#7a1808;--text3:#b86858;--accent:#c02808;--accent2:#880c00;--accent-rgb:192,40,8;--new-glow:rgba(192,40,8,.4);--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#dce8fd;--vy-text:#0f3882}

body.palette-slate{--bg:#090c12;--surface:#111620;--surface2:#1a2030;--border:rgba(100,140,200,.09);--border2:rgba(100,140,200,.16);--text:#e8eef8;--text2:#8898b8;--text3:#485878;--accent:#6888d0;--accent2:#a8c0f0;--accent-rgb:104,136,208;--new-glow:rgba(104,136,208,.4);--ty-bg:#0a2018;--ty-text:#3dd68c;--vy-bg:#0a1428;--vy-text:#80a8f8}
body.palette-slate.light{--bg:#f0f2f8;--surface:#fff;--surface2:#dce4f0;--border:rgba(40,60,120,.10);--border2:rgba(40,60,120,.18);--text:#080c20;--text2:#283870;--text3:#6878a8;--accent:#2840a0;--accent2:#0c2070;--accent-rgb:40,64,160;--new-glow:rgba(40,64,160,.4);--ty-bg:#d4f5e4;--ty-text:#0a5030;--vy-bg:#d8e4fc;--vy-text:#0c2a88}

body.palette-copper{--bg:#110d08;--surface:#1c1410;--surface2:#281e16;--border:rgba(200,120,60,.09);--border2:rgba(200,120,60,.16);--text:#f8ece0;--text2:#c89870;--text3:#805840;--accent:#c87840;--accent2:#f0b880;--accent-rgb:200,120,64;--new-glow:rgba(200,120,64,.4);--ty-bg:#0b2018;--ty-text:#3dd68c;--vy-bg:#0b1830;--vy-text:#5ba8f5}
body.palette-copper.light{--bg:#faf4ec;--surface:#fff;--surface2:#f0e4d0;--border:rgba(140,70,20,.10);--border2:rgba(140,70,20,.18);--text:#200c00;--text2:#783010;--text3:#b07848;--accent:#a04808;--accent2:#702800;--accent-rgb:160,72,8;--new-glow:rgba(160,72,8,.4);--ty-bg:#d8f5e4;--ty-text:#0f5c30;--vy-bg:#d8e8fc;--vy-text:#0f3882}

/* ── RESET & BASE ─────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px}

/* ── HEADER ───────────────────────────────────────────────────────────────── */
header{border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;background:var(--bg);z-index:200;gap:10px}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent);letter-spacing:.01em;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-toggle{display:none;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;padding:7px 11px;font-size:18px;line-height:1}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%;background:#3a3835;display:inline-block;margin-right:5px;transition:background .3s;flex-shrink:0}
.status-dot.online{background:var(--ty-text)}
body.light .status-dot{background:#c8c0b4}
#status-text{font-size:13px;color:var(--text3)}

/* ── PALETTE ──────────────────────────────────────────────────────────────── */
.palette-wrap{position:relative}
.palette-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.palette-btn:hover{border-color:var(--accent);color:var(--text)}
.pal-swatch-btn{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.palette-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:14px;display:none;z-index:300;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.palette-dropdown.open{display:block}
.palette-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pal-item{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.pal-dot{width:30px;height:30px;border-radius:50%;border:2px solid transparent;transition:transform .15s,border-color .15s}
.pal-dot:hover{transform:scale(1.15)}
.pal-dot.active{border-color:var(--text)}
.pal-dot-label{font-size:10px;color:var(--text3);margin-top:4px;text-align:center}

/* ── THEME TOGGLE ─────────────────────────────────────────────────────────── */
.theme-toggle{display:flex;align-items:center;gap:7px}
.toggle-switch{position:relative;width:38px;height:22px;cursor:pointer;flex-shrink:0}
.toggle-switch input{display:none}
.toggle-track{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;transition:background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--accent);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--text3);transition:transform .2s,background .2s}
.toggle-switch input:checked~.toggle-thumb{transform:translateX(16px);background:#fff}
.toggle-icon{font-size:14px;color:var(--text2)}

/* ── LAYOUT ───────────────────────────────────────────────────────────────── */
.layout{display:flex;height:calc(100vh - 64px);position:relative;overflow:hidden}

/* ── SIDEBAR ──────────────────────────────────────────────────────────────── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;background:var(--bg);transition:transform .25s ease}
.sidebar-top{padding:.875rem 1rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.sidebar-add{display:flex;gap:6px}
.sidebar-add input,.sidebar-search-input,.sidebar-filter-row select{font-size:14px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif}
.sidebar-add input{flex:1}
.sidebar-add input:focus,.sidebar-search-input:focus{border-color:var(--accent)}
.sidebar-search-input{width:100%}
.sidebar-filter-row{display:flex;gap:6px}
.sidebar-filter-row select{flex:1;font-size:13px;padding:7px 10px;cursor:pointer}
.sidebar-filter-row select:focus{border-color:var(--accent)}
.btn-sm{padding:9px 14px;font-size:14px;border-radius:10px;background:var(--accent);color:#0f0e0c;border:none;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif;transition:opacity .15s;flex-shrink:0}
.btn-sm:hover{opacity:.85}

/* groups */
.sidebar-group{padding:.75rem 1rem .5rem;flex-shrink:0}
.sidebar-label{font-size:11px;letter-spacing:.09em;color:var(--text3);text-transform:uppercase;margin-bottom:5px;padding:0 2px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sidebar-label:hover{color:var(--text2)}
.sidebar-label-right{display:flex;align-items:center;gap:6px}
.sidebar-label-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 8px;border-radius:8px}
.sidebar-label-arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.sidebar-label-arrow.collapsed{transform:rotate(-90deg)}
.group-content{overflow:hidden;transition:max-height .25s ease}

/* drama buttons */
.drama-btn{width:100%;text-align:left;padding:9px 12px;border-radius:10px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.drama-btn:hover{background:var(--surface);color:var(--text)}
.drama-btn.active{background:var(--surface2);color:var(--accent2)}
.drama-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.4}
.drama-btn.active .dot{opacity:1}
.drama-btn-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drama-done .dot{background:var(--text3)}
.drama-trash .dot{background:#b05050}
/* delete only visible in trash */
.drama-del-btn{display:none;font-size:14px;color:#c05050;border:none;background:transparent;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.trash-group .drama-btn:hover .drama-del-btn{display:inline}
.empty-group{font-size:13px;color:var(--text3);padding:3px 6px}

/* ── SIDEBAR OVERLAY ──────────────────────────────────────────────────────── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:149}

/* ── MAIN ─────────────────────────────────────────────────────────────────── */
main{flex:1;overflow-y:auto;padding:2rem 2.5rem;min-width:0}
.no-drama{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:16px}
.no-drama .big{font-family:'DM Serif Display',serif;font-size:56px;color:var(--border2)}
.no-drama .hint{font-size:16px}

/* ── TABS ─────────────────────────────────────────────────────────────────── */
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;margin-bottom:1.75rem;flex-shrink:0}
.tab{padding:11px 20px;font-size:15px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── CARDS ────────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem}
.card-title{font-size:12px;letter-spacing:.09em;color:var(--text3);text-transform:uppercase;margin-bottom:16px;font-weight:500}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.card-header .card-title{margin:0;flex:1}

/* ── FORM ─────────────────────────────────────────────────────────────────── */
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select{padding:10px 14px;font-size:15px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg);color:var(--text)}
.btn{padding:10px 20px;font-size:15px;border-radius:var(--radius);background:var(--accent);color:#0f0e0c;border:none;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);opacity:1}
.btn-danger{background:#b03030;color:#fff;border:none}
.btn-danger:hover{opacity:.85}

/* ── GENDER ───────────────────────────────────────────────────────────────── */
.gender-select{display:flex;border:1px solid var(--border2);border-radius:10px;overflow:hidden;flex-shrink:0}
.gender-opt{padding:10px 16px;font-size:14px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.gender-opt.active{background:var(--accent);color:#0f0e0c;font-weight:500}
.gender-icon{font-size:11px;font-weight:600;padding:1px 5px;border-radius:6px;margin-left:5px;vertical-align:middle}
.gender-m{background:rgba(91,168,245,.2);color:var(--vy-text)}
.gender-f{background:rgba(232,115,154,.2);color:#e8739a}

/* ── BADGES ───────────────────────────────────────────────────────────────── */
.badge{display:inline-block;font-size:13px;padding:3px 12px;border-radius:12px;font-weight:500}
.badge.ty{background:var(--ty-bg);color:var(--ty-text)}
.badge.vy{background:var(--vy-bg);color:var(--vy-text)}
.badge.dash{background:var(--surface2);color:var(--text3)}

/* ── CHARS ────────────────────────────────────────────────────────────────── */
.chars-wrap{display:flex;flex-wrap:wrap;gap:8px;min-height:32px}

/* new char: SVG ring animation */
.char-tag{display:inline-flex;align-items:center;gap:6px;font-size:15px;padding:6px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:24px;color:var(--text2);position:relative;transition:color .2s}
.char-tag.char-new{border-color:var(--accent);color:var(--text)}

/* delete timer ring */
.char-tag.pending-delete{border-color:transparent;color:#c07070;background:rgba(176,48,48,.08)}
.del-ring-wrap{position:relative;width:22px;height:22px;flex-shrink:0;cursor:pointer}
.del-ring-bg{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(176,48,48,.2)}
.del-ring-svg{position:absolute;inset:0;width:22px;height:22px;transform:rotate(-90deg)}
.del-ring-circle{fill:none;stroke:#c03030;stroke-width:2;stroke-dasharray:60;stroke-dashoffset:60;stroke-linecap:round;transition:none}
.del-ring-x{font-size:13px;line-height:22px;text-align:center;width:22px;height:22px;color:#c07070;position:absolute;inset:0}

.del-btn{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:17px;line-height:1;padding:0;font-family:inherit;transition:color .15s}
.del-btn:hover{color:#e05050}
.restore-btn{border:none;background:transparent;color:#d09040;cursor:pointer;font-size:13px;line-height:1;padding:0;font-family:inherit;font-weight:700;white-space:nowrap}
.restore-btn:hover{color:#f0b060}

/* ── PAIRS ────────────────────────────────────────────────────────────────── */
.pair-item{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px;font-size:15px}
.pair-body{flex:1}
.pair-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.pair-row:last-child{margin-bottom:0}
.pair-arrow{color:var(--text3);font-size:13px}
.pair-note{font-size:13px;color:var(--text3);margin-top:6px}

/* ── SEARCH RESULT ────────────────────────────────────────────────────────── */
.result-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.75rem;margin-top:1.5rem}
.result-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent2);margin-bottom:16px}
.result-row{display:flex;align-items:center;gap:10px;font-size:16px;margin-bottom:10px;flex-wrap:wrap}

/* ── HISTORY ──────────────────────────────────────────────────────────────── */
.history-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.history-item:last-child{border-bottom:none}
.history-time{font-size:12px;color:var(--text3);white-space:nowrap;min-width:95px;padding-top:2px}
.history-desc{flex:1;font-size:14px;color:var(--text2);line-height:1.5}
.history-desc b{color:var(--text);font-weight:500}
.history-undo{font-size:13px;padding:5px 12px;border-radius:8px;background:transparent;border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;transition:all .15s}
.history-undo:hover{border-color:var(--accent);color:var(--accent)}

/* ── STATUS / AIRDAY ──────────────────────────────────────────────────────── */
.status-row{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--text2);flex-wrap:wrap}
.seg-wrap{display:flex;border:1px solid var(--border2);border-radius:10px;overflow:hidden;flex-wrap:nowrap}
.seg-opt{padding:8px 14px;font-size:14px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.seg-opt.active{background:var(--accent);color:#0f0e0c;font-weight:500}
.del-drama-btn{padding:9px 18px;font-size:14px;border-radius:var(--radius);background:#b03030;color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;display:none}
.del-drama-btn:hover{opacity:.85}
.del-drama-btn.show{display:inline-block}

/* ── MODAL ────────────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;max-width:380px;width:100%}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:10px}
.modal-text{font-size:15px;color:var(--text2);margin-bottom:1.75rem;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}

/* ── MISC ─────────────────────────────────────────────────────────────────── */
.pane{display:none}.pane.active{display:block}
.empty{font-size:15px;color:var(--text3);padding:4px 0}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-family:'DM Serif Display',serif;font-size:15px;color:var(--text3);letter-spacing:.05em}

/* ── MOBILE ───────────────────────────────────────────────────────────────── */
@media(max-width:700px){
  :root{--sidebar-w:290px}
  header{padding:0 1rem;height:58px}
  .logo{font-size:19px}
  .sidebar-toggle{display:block}
  #status-text{display:none}
  .sidebar{position:fixed;top:58px;left:0;bottom:0;z-index:150;transform:translateX(-100%);border-right:1px solid var(--border2);box-shadow:4px 0 24px rgba(0,0,0,.4);background:var(--bg)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.active{display:block}
  main{padding:1.25rem}
  .layout{height:calc(100vh - 58px)}
  .tab{padding:9px 14px;font-size:14px}
}
</style>
</head>
<body>

<div id="loading">연결 중…</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<header>
  <div class="logo">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    Baddest Females
  </div>
  <div class="header-right">
    <div><span class="status-dot" id="status-dot"></span><span id="status-text">подключение…</span></div>
    <div class="palette-wrap" id="palette-wrap">
      <button class="palette-btn" onclick="togglePaletteDropdown()">
        <div class="pal-swatch-btn" id="pal-swatch"></div>Цвет
      </button>
      <div class="palette-dropdown" id="palette-dropdown">
        <div class="palette-grid" id="palette-grid"></div>
      </div>
    </div>
    <div class="theme-toggle">
      <span class="toggle-icon">☽</span>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-chk" onchange="toggleTheme(this.checked)">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
      <span class="toggle-icon">☀</span>
    </div>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-add">
        <input id="drama-input" placeholder="Новая дорама…" onkeydown="if(event.key==='Enter')addDrama()">
        <button class="btn-sm" onclick="addDrama()">+</button>
      </div>
      <input class="sidebar-search-input" placeholder="Поиск дорам…" oninput="filterDramas(this.value)">
      <div class="sidebar-filter-row">
        <select id="airday-filter" onchange="renderSidebar()">
          <option value="">Все дни</option>
          <option value="mn-tu">ПН-ВТ</option>
          <option value="wd-th">СР-ЧТ</option>
          <option value="fr-su">ПТ-ВС</option>
        </select>
      </div>
    </div>

    <!-- active -->
    <div class="sidebar-group" id="group-active">
      <div class="sidebar-label" onclick="toggleGroup('active')">
        Текущие
        <div class="sidebar-label-right">
          <span class="sidebar-label-count" id="count-active">0</span>
          <span class="sidebar-label-arrow" id="arrow-active">▾</span>
        </div>
      </div>
      <div class="group-content" id="drama-list-active"></div>
    </div>
    <!-- done -->
    <div class="sidebar-group" id="group-done">
      <div class="sidebar-label" onclick="toggleGroup('done')">
        Завершённые
        <div class="sidebar-label-right">
          <span class="sidebar-label-count" id="count-done">0</span>
          <span class="sidebar-label-arrow collapsed" id="arrow-done">▾</span>
        </div>
      </div>
      <div class="group-content" id="drama-list-done" style="max-height:0;overflow:hidden"></div>
    </div>
    <!-- trash -->
    <div class="sidebar-group trash-group" id="group-trash">
      <div class="sidebar-label" onclick="toggleGroup('trash')">
        Корзина
        <div class="sidebar-label-right">
          <span class="sidebar-label-count" id="count-trash">0</span>
          <span class="sidebar-label-arrow collapsed" id="arrow-trash">▾</span>
        </div>
      </div>
      <div class="group-content" id="drama-list-trash" style="max-height:0;overflow:hidden"></div>
    </div>
  </div>

  <main>
    <div id="no-drama" class="no-drama">
      <div class="big">배디스트 피메일즈</div>
      <div class="hint">Выбери дораму слева или создай новую</div>
    </div>
    <div id="drama-view" style="display:none">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('chars',this)">Персонажи</button>
        <button class="tab" onclick="switchTab('pairs',this)">Пары</button>
        <button class="tab" onclick="switchTab('search',this)">Поиск</button>
        <button class="tab" onclick="switchTab('history',this)">История</button>
      </div>

      <!-- CHARS pane -->
      <div id="pane-chars" class="pane active">
        <div class="card">
          <div class="card-title">Добавить персонажа</div>
          <div class="form-row">
            <input id="char-input" placeholder="Имя персонажа" onkeydown="if(event.key==='Enter')addChar()" style="flex:1;min-width:120px">
            <div class="gender-select">
              <button class="gender-opt active" id="g-m" onclick="setGender('m')">М</button>
              <button class="gender-opt" id="g-f" onclick="setGender('f')">Ж</button>
            </div>
            <button class="btn" onclick="addChar()">Добавить</button>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Список персонажей</div>
            <input id="chars-search" placeholder="Поиск…" oninput="renderChars()" style="font-size:13px;padding:7px 11px;width:130px;flex-shrink:0">
            <select id="chars-sort" onchange="renderChars()" style="font-size:13px;padding:7px 11px;flex-shrink:0">
              <option value="alpha">По алфавиту</option>
              <option value="date">По дате</option>
            </select>
          </div>
          <div class="chars-wrap" id="chars-list"></div>
        </div>
        <div class="card">
          <div class="card-title">День недели эфира</div>
          <div class="status-row">
            <div class="seg-wrap">
              <button class="seg-opt" id="air-none" onclick="setAirday('')">—</button>
              <button class="seg-opt" id="air-mn-tu" onclick="setAirday('mn-tu')">ПН-ВТ</button>
              <button class="seg-opt" id="air-wd-th" onclick="setAirday('wd-th')">СР-ЧТ</button>
              <button class="seg-opt" id="air-fr-su" onclick="setAirday('fr-su')">ПТ-ВС</button>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Переместить дораму</div>
          <div class="status-row">
            <div class="seg-wrap">
              <button class="seg-opt" id="status-ongoing" onclick="setDramaStatus('ongoing')">Текущие</button>
              <button class="seg-opt" id="status-done" onclick="setDramaStatus('done')">Завершённые</button>
              <button class="seg-opt" id="status-trash" onclick="setDramaStatus('trash')">Корзина</button>
            </div>
            <button class="del-drama-btn" id="del-drama-btn" onclick="confirmDeleteCurrentDrama()">🗑 Удалить навсегда</button>
          </div>
        </div>
      </div>

      <!-- PAIRS pane -->
      <div id="pane-pairs" class="pane">
        <div class="card">
          <div class="card-title">Добавить пару</div>
          <div class="form-row" style="margin-bottom:12px">
            <select id="sel-a" style="flex:1"><option value="">— от кого —</option></select>
            <select id="sel-b" style="flex:1"><option value="">— к кому —</option></select>
          </div>
          <div class="form-row" style="margin-bottom:12px">
            <span style="font-size:13px;color:var(--text3);white-space:nowrap">А→Б:</span>
            <select id="sel-speech"><option value="ты">ты</option><option value="вы">вы</option><option value="—">—</option></select>
            <span style="font-size:13px;color:var(--text3);white-space:nowrap">Б→А:</span>
            <select id="sel-speech-rev"><option value="ты">ты</option><option value="вы">вы</option><option value="—">—</option></select>
          </div>
          <div class="form-row">
            <input id="note-input" placeholder="Заметка (необязательно)" style="flex:1">
            <button class="btn" onclick="addPair()">Сохранить</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Все пары</div>
          <div id="pairs-list"></div>
        </div>
      </div>

      <!-- SEARCH pane -->
      <div id="pane-search" class="pane">
        <div class="card">
          <div class="card-title">Найти пару</div>
          <div class="form-row">
            <select id="find-a" onchange="renderResult()" style="flex:1"><option value="">— персонаж А —</option></select>
            <select id="find-b" onchange="renderResult()" style="flex:1"><option value="">— персонаж Б —</option></select>
          </div>
          <div id="result-area"></div>
        </div>
      </div>

      <!-- HISTORY pane -->
      <div id="pane-history" class="pane">
        <div class="card">
          <div class="card-title">История изменений</div>
          <div id="history-list"><div class="empty">Нет изменений</div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-danger" id="modal-confirm">Удалить</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase,ref,onValue,set,remove,push,update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyAg_UhVP2DRU_jrqJD-Or3Iy8ZEIQWaAIU",
  authDomain:"bfnames.firebaseapp.com",
  databaseURL:"https://bfnames-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"bfnames",
  storageBucket:"bfnames.firebasestorage.app",
  messagingSenderId:"1066954721078",
  appId:"1:1066954721078:web:fb729d5ccb8671db175597"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let state={dramas:{},currentDrama:null};
let dramaFilter='';
let pendingDeletes={};  // key->{name,gender,timer,rafId,startTs}
let newCharKeys={};     // key->true
let selectedGender='m';
let collapsedGroups=new Set(JSON.parse(localStorage.getItem('dc_collapsed')||'["done","trash"]'));

// ── STATUS ────────────────────────────────────────────────────────────────
function setStatus(ok){
  document.getElementById('status-dot').className='status-dot'+(ok?' online':'');
  document.getElementById('status-text').textContent=ok?'синхронизировано':'нет связи';
}

// ── SYNC ─────────────────────────────────────────────────────────────────
onValue(ref(db,'dramas'),snap=>{
  document.getElementById('loading').style.display='none';
  setStatus(true);
  state.dramas=snap.val()||{};
  renderSidebar();
  if(state.currentDrama) renderCurrentDrama();
},()=>{setStatus(false);document.getElementById('loading').style.display='none';});

// ── MOBILE ────────────────────────────────────────────────────────────────
window.toggleSidebar=()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('active');
};
window.closeSidebar=()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('active');
};

// ── COLLAPSIBLE GROUPS ────────────────────────────────────────────────────
window.toggleGroup=function(g){
  const el=document.getElementById('drama-list-'+g);
  const arrow=document.getElementById('arrow-'+g);
  if(collapsedGroups.has(g)){
    collapsedGroups.delete(g);
    el.style.maxHeight=el.scrollHeight+'px';
    arrow.classList.remove('collapsed');
  } else {
    collapsedGroups.add(g);
    el.style.maxHeight='0';
    arrow.classList.add('collapsed');
  }
  localStorage.setItem('dc_collapsed',JSON.stringify([...collapsedGroups]));
};

function applyGroupCollapse(g){
  const el=document.getElementById('drama-list-'+g);
  const arrow=document.getElementById('arrow-'+g);
  if(!el||!arrow) return;
  if(collapsedGroups.has(g)){
    el.style.maxHeight='0';
    el.style.overflow='hidden';
    arrow.classList.add('collapsed');
  } else {
    el.style.maxHeight=el.scrollHeight+'px';
    el.style.overflow='hidden';
    arrow.classList.remove('collapsed');
  }
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
window.renderSidebar=function renderSidebar(){
  const q=dramaFilter.toLowerCase();
  const af=document.getElementById('airday-filter')?.value||'';
  let keys=Object.keys(state.dramas);
  if(q) keys=keys.filter(k=>(state.dramas[k].name||k).toLowerCase().includes(q));
  keys.sort((a,b)=>(state.dramas[a].name||a).localeCompare(state.dramas[b].name||b,'ru'));

  const active=keys.filter(k=>{
    const d=state.dramas[k];
    const statusOk=!d.status||d.status==='ongoing';
    const airOk=!af||d.airday===af;
    return statusOk&&airOk;
  });
  const done  =keys.filter(k=>state.dramas[k].status==='done');
  const trash =keys.filter(k=>state.dramas[k].status==='trash');

  document.getElementById('count-active').textContent=active.length;
  document.getElementById('count-done').textContent=done.length;
  document.getElementById('count-trash').textContent=trash.length;

  function airdayTag(d){
    if(!d.airday) return '';
    const labels={'mn-tu':'ПН-ВТ','wd-th':'СР-ЧТ','fr-su':'ПТ-ВС'};
    return `<span style="font-size:10px;color:var(--text3);border:1px solid var(--border2);border-radius:5px;padding:1px 5px;flex-shrink:0">${labels[d.airday]||''}</span>`;
  }

  function makeBtn(k,extraCls,showDel){
    const d=state.dramas[k];
    const isAct=state.currentDrama===k;
    const del=showDel?`<button class="drama-del-btn" onclick="event.stopPropagation();confirmDeleteDrama('${k}')" title="Удалить">🗑</button>`:'';
    return `<button class="drama-btn${isAct?' active':''}${extraCls}" onclick="selectDrama('${k}')">
      <span class="dot"></span><span class="drama-btn-name">${d.name||k}</span>${airdayTag(d)}${del}
    </button>`;
  }

  function fill(list,id,cls,showDel){
    const el=document.getElementById(id);
    el.innerHTML=list.length?list.map(k=>makeBtn(k,cls,showDel)).join(''):'<div class="empty-group">Нет дорам</div>';
    // after setting innerHTML expand max-height properly
    if(!collapsedGroups.has(id.replace('drama-list-',''))) el.style.maxHeight=el.scrollHeight+'px';
  }

  fill(active,'drama-list-active','',false);
  fill(done,  'drama-list-done',' drama-done',false);
  fill(trash, 'drama-list-trash',' drama-trash',true);

  applyGroupCollapse('active');
  applyGroupCollapse('done');
  applyGroupCollapse('trash');
};

window.filterDramas=v=>{dramaFilter=v;renderSidebar();};

window.addDrama=function(){
  const inp=document.getElementById('drama-input');
  const v=inp.value.trim(); if(!v) return;
  push(ref(db,'dramas'),{name:v,chars:{},pairs:{},status:'ongoing'});
  inp.value='';
};

window.selectDrama=function(id){
  state.currentDrama=id;
  pendingDeletes={};
  newCharKeys={};
  document.getElementById('no-drama').style.display='none';
  document.getElementById('drama-view').style.display='block';
  renderSidebar();
  renderCurrentDrama();
  closeSidebar();
};

// ── DELETE DRAMA ──────────────────────────────────────────────────────────
function doDeleteDrama(id){
  remove(ref(db,`dramas/${id}`));
  if(state.currentDrama===id){
    state.currentDrama=null;
    document.getElementById('no-drama').style.display='';
    document.getElementById('drama-view').style.display='none';
  }
}
window.confirmDeleteDrama=function(id){
  const name=(state.dramas[id]||{}).name||id;
  showModal('Удалить навсегда?',`«${name}» — все данные будут удалены без возможности восстановления.`,()=>doDeleteDrama(id));
};
window.confirmDeleteCurrentDrama=function(){
  if(!state.currentDrama) return;
  confirmDeleteDrama(state.currentDrama);
};

// ── MODAL ─────────────────────────────────────────────────────────────────
function showModal(title,text,onConfirm){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-text').textContent=text;
  document.getElementById('modal-overlay').style.display='flex';
  document.getElementById('modal-confirm').onclick=()=>{onConfirm();closeModal();};
}
window.closeModal=()=>{document.getElementById('modal-overlay').style.display='none';};
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── CURRENT DRAMA ─────────────────────────────────────────────────────────
function renderCurrentDrama(){
  const d=state.dramas[state.currentDrama]; if(!d) return;
  renderChars();
  renderPairs();
  updateSelects();
  renderHistory();
  // status buttons
  const s=d.status||'ongoing';
  ['ongoing','done','trash'].forEach(v=>document.getElementById('status-'+v).classList.toggle('active',s===v));
  // delete button: only show when status=trash
  document.getElementById('del-drama-btn').classList.toggle('show',s==='trash');
  // airday buttons
  const air=d.airday||'';
  document.getElementById('air-none').classList.toggle('active',air==='');
  ['mn-tu','wd-th','fr-su'].forEach(v=>document.getElementById('air-'+v).classList.toggle('active',air===v));
}

function drama(){return state.dramas[state.currentDrama]||{};}
function dramaPath(){return `dramas/${state.currentDrama}`;}

// ── DRAMA STATUS ──────────────────────────────────────────────────────────
window.setDramaStatus=function(status){
  if(!state.currentDrama) return;
  const prev=drama().status||'ongoing';
  if(prev===status) return;
  if(status==='done'||status==='trash') remove(ref(db,`${dramaPath()}/history`));
  update(ref(db,dramaPath()),{status});
  if(status!=='trash') logHistory(`Статус → «${status==='done'?'Завершена':'Текущие'}»`,'status',{status});
};

// ── AIR DAY ───────────────────────────────────────────────────────────────
window.setAirday=function(val){
  if(!state.currentDrama) return;
  update(ref(db,dramaPath()),{airday:val});
};

// ── HISTORY ───────────────────────────────────────────────────────────────
function logHistory(desc,type,payload){
  if(!state.currentDrama) return;
  const now=Date.now();
  const cutoff=now-30*24*60*60*1000;
  Object.entries(drama().history||{}).forEach(([k,h])=>{
    if(h.ts<cutoff) remove(ref(db,`${dramaPath()}/history/${k}`));
  });
  push(ref(db,`${dramaPath()}/history`),{desc,type,payload,ts:now});
}

function escQ(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function renderHistory(){
  const entries=Object.entries(drama().history||{});
  const w=document.getElementById('history-list');
  if(!entries.length){w.innerHTML='<div class="empty">Нет изменений</div>';return;}
  w.innerHTML=entries.sort((a,b)=>b[1].ts-a[1].ts).map(([k,h])=>{
    const d=new Date(h.ts);
    const t=d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    let undo='';
    if(h.type==='add_char') undo=`<button class="history-undo" onclick="undoAddChar('${h.payload.key}','${k}')">↩ Отменить</button>`;
    else if(h.type==='del_char') undo=`<button class="history-undo" onclick="undoDelChar('${h.payload.key}','${escQ(h.payload.name)}','${h.payload.gender||'m'}','${k}')">↩ Восстановить</button>`;
    else if(h.type==='add_pair') undo=`<button class="history-undo" onclick="undoAddPair('${h.payload.pairKey}','${k}')">↩ Отменить</button>`;
    else if(h.type==='del_pair') undo=`<button class="history-undo" onclick="undoDelPair('${k}')">↩ Восстановить</button>`;
    return `<div class="history-item"><div class="history-time">${t}</div><div class="history-desc">${h.desc}</div>${undo}</div>`;
  }).join('');
}

window.undoAddChar=(ck,hk)=>{remove(ref(db,`${dramaPath()}/chars/${ck}`));remove(ref(db,`${dramaPath()}/history/${hk}`));};
window.undoDelChar=(ck,cn,cg,hk)=>{set(ref(db,`${dramaPath()}/chars/${ck}`),{name:cn,gender:cg||'m'});remove(ref(db,`${dramaPath()}/history/${hk}`));};
window.undoAddPair=(pk,hk)=>{remove(ref(db,`${dramaPath()}/pairs/${pk}`));remove(ref(db,`${dramaPath()}/history/${hk}`));};
window.undoDelPair=hk=>{
  const h=(drama().history||{})[hk]; if(!h) return;
  const p=h.payload;
  set(ref(db,`${dramaPath()}/pairs/${p.pairKey}`),{a:p.a,b:p.b,speech:p.speech,speechRev:p.speechRev,note:p.note||''});
  remove(ref(db,`${dramaPath()}/history/${hk}`));
};

// ── GENDER ────────────────────────────────────────────────────────────────
window.setGender=function(g){
  selectedGender=g;
  document.getElementById('g-m').classList.toggle('active',g==='m');
  document.getElementById('g-f').classList.toggle('active',g==='f');
};

function genderIcon(g){
  if(g==='f') return '<span class="gender-icon gender-f">Ж</span>';
  return '<span class="gender-icon gender-m">М</span>';
}

// ── CHARS ─────────────────────────────────────────────────────────────────
window.renderChars=function(){
  // chars stored as {name,gender} objects or legacy strings
  let rawChars=Object.entries(drama().chars||{});
  const q=(document.getElementById('chars-search')?.value||'').trim().toLowerCase();
  const sort=document.getElementById('chars-sort')?.value||'alpha';

  let chars=rawChars.map(([k,v])=>{
    const name=typeof v==='object'?v.name:v;
    const gender=typeof v==='object'?v.gender:'m';
    return [k,name,gender];
  });

  if(q) chars=chars.filter(([,n])=>n.toLowerCase().includes(q));
  if(sort==='alpha') chars=[...chars].sort((a,b)=>a[1].localeCompare(b[1],'ru'));

  const w=document.getElementById('chars-list');
  if(!chars.length){w.innerHTML='<span class="empty">Нет персонажей</span>';return;}

  w.innerHTML=chars.map(([k,name,gender])=>{
    if(pendingDeletes[k]){
      const pd=pendingDeletes[k];
      const elapsed=Date.now()-pd.startTs;
      const prog=Math.min(elapsed/5000,1);
      const circ=60;
      const dashoffset=circ-(circ*prog);
      return `<span class="char-tag pending-delete" data-key="${k}">
        ${genderIcon(gender)}${name}
        <span class="del-ring-wrap" onclick="restoreChar('${k}')" title="Восстановить">
          <span class="del-ring-bg"></span>
          <svg class="del-ring-svg" viewBox="0 0 22 22"><circle class="del-ring-circle" cx="11" cy="11" r="9" style="stroke-dashoffset:${dashoffset}"/></svg>
          <span class="del-ring-x">↩</span>
        </span>
      </span>`;
    }
    const isNew=!!newCharKeys[k];
    return `<span class="char-tag${isNew?' char-new':''}" data-key="${k}">
      ${genderIcon(gender)}${name}<button class="del-btn" onclick="removeChar('${k}')">×</button>
    </span>`;
  }).join('');
};

function updateSelects(){
  const rawChars=Object.entries(drama().chars||{});
  const chars=rawChars.map(([k,v])=>[k,typeof v==='object'?v.name:v]);
  const opts='<option value="">— выбрать —</option>'+chars.map(([k,n])=>`<option value="${k}">${n}</option>`).join('');
  ['sel-a','sel-b','find-a','find-b'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    const cur=el.value; el.innerHTML=opts;
    if(chars.find(([k])=>k===cur)) el.value=cur;
  });
}

window.addChar=function(){
  const inp=document.getElementById('char-input');
  const v=inp.value.trim(); if(!v||!state.currentDrama) return;
  const r=push(ref(db,`${dramaPath()}/chars`));
  set(r,{name:v,gender:selectedGender});
  logHistory(`Добавлен персонаж <b>${v}</b> (${selectedGender==='f'?'Ж':'М'})`,'add_char',{key:r.key,name:v,gender:selectedGender});
  newCharKeys[r.key]=true;
  // remove highlight after 10s
  setTimeout(()=>{delete newCharKeys[r.key];renderChars();},10000);
  inp.value='';
  renderChars();  // render immediately so new char appears highlighted
};

// ── ANIMATED RING DELETE ──────────────────────────────────────────────────
const RING_CIRC=60; // stroke-dasharray value (≈2π*9)
const DELETE_MS=5000;

function animateRing(key){
  if(!pendingDeletes[key]) return;
  const pd=pendingDeletes[key];
  const elapsed=Date.now()-pd.startTs;
  const prog=Math.min(elapsed/DELETE_MS,1);
  const dashoffset=RING_CIRC-(RING_CIRC*prog);

  // find the ring circle in DOM without full re-render
  const wrap=document.querySelector(`.char-tag[data-key="${key}"] .del-ring-svg .del-ring-circle`);
  if(wrap) wrap.style.strokeDashoffset=dashoffset;

  if(prog<1){
    pd.rafId=requestAnimationFrame(()=>animateRing(key));
  }
}

window.removeChar=function(key){
  if(pendingDeletes[key]) return;
  const raw=drama().chars?.[key];
  if(!raw) return;
  const name=typeof raw==='object'?raw.name:raw;
  const gender=typeof raw==='object'?raw.gender:'m';
  pendingDeletes[key]={name,gender,timer:null,rafId:null,startTs:Date.now()};
  renderChars();
  // start RAF animation
  pendingDeletes[key].rafId=requestAnimationFrame(()=>animateRing(key));
  // actual delete after 5s
  pendingDeletes[key].timer=setTimeout(()=>{
    if(pendingDeletes[key]?.rafId) cancelAnimationFrame(pendingDeletes[key].rafId);
    const pairs=drama().pairs||{};
    Object.entries(pairs).filter(([,p])=>p.a===key||p.b===key)
      .forEach(([pk])=>remove(ref(db,`${dramaPath()}/pairs/${pk}`)));
    remove(ref(db,`${dramaPath()}/chars/${key}`));
    logHistory(`Удалён персонаж <b>${name}</b>`,'del_char',{key,name,gender});
    delete pendingDeletes[key];
    renderChars();
  },DELETE_MS);
};

window.restoreChar=function(key){
  if(!pendingDeletes[key]) return;
  clearTimeout(pendingDeletes[key].timer);
  if(pendingDeletes[key].rafId) cancelAnimationFrame(pendingDeletes[key].rafId);
  delete pendingDeletes[key];
  renderChars();
};

// ── PAIRS ─────────────────────────────────────────────────────────────────
function badge(s){const c=s==='ты'?'ty':s==='вы'?'vy':'dash';return `<span class="badge ${c}">${s}</span>`;}
function charName(k){
  const v=(drama().chars||{})[k];
  if(!v) return k;
  return typeof v==='object'?v.name:v;
}

function renderPairs(){
  const pairs=Object.entries(drama().pairs||{});
  const w=document.getElementById('pairs-list');
  if(!pairs.length){w.innerHTML='<div class="empty">Нет пар</div>';return;}
  w.innerHTML=pairs.map(([k,p])=>`
    <div class="pair-item">
      <div class="pair-body">
        <div class="pair-row">${charName(p.a)}<span class="pair-arrow">→</span>${charName(p.b)}: ${badge(p.speech)}</div>
        <div class="pair-row">${charName(p.b)}<span class="pair-arrow">→</span>${charName(p.a)}: ${badge(p.speechRev)}</div>
        ${p.note?`<div class="pair-note">${p.note}</div>`:''}
      </div>
      <button class="del-btn" onclick="removePair('${k}')">×</button>
    </div>`).join('');
}

window.addPair=function(){
  const a=document.getElementById('sel-a').value,b=document.getElementById('sel-b').value;
  if(!a||!b||a===b){alert('Выбери двух разных персонажей');return;}
  const s=document.getElementById('sel-speech').value,sr=document.getElementById('sel-speech-rev').value;
  const note=document.getElementById('note-input').value.trim();
  const pairs=drama().pairs||{};
  Object.entries(pairs).forEach(([k,p])=>{
    if((p.a===a&&p.b===b)||(p.a===b&&p.b===a)) remove(ref(db,`${dramaPath()}/pairs/${k}`));
  });
  const r=push(ref(db,`${dramaPath()}/pairs`));
  set(r,{a,b,speech:s,speechRev:sr,note});
  logHistory(`Добавлена пара <b>${charName(a)}</b> — <b>${charName(b)}</b> (${s}/${sr})`,'add_pair',{pairKey:r.key,a,b,speech:s,speechRev:sr,note});
  document.getElementById('note-input').value='';
};

window.removePair=function(key){
  const p=(drama().pairs||{})[key]; if(!p) return;
  logHistory(`Удалена пара <b>${charName(p.a)}</b> — <b>${charName(p.b)}</b>`,'del_pair',
    {pairKey:key,a:p.a,b:p.b,speech:p.speech,speechRev:p.speechRev,note:p.note||''});
  remove(ref(db,`${dramaPath()}/pairs/${key}`));
};

// ── SEARCH ────────────────────────────────────────────────────────────────
window.renderResult=function(){
  const ak=document.getElementById('find-a').value,bk=document.getElementById('find-b').value;
  const ra=document.getElementById('result-area');
  if(!ak||!bk){ra.innerHTML='';return;}
  if(ak===bk){ra.innerHTML='<div class="empty" style="margin-top:10px">Выбери разных персонажей</div>';return;}
  const p=Object.values(drama().pairs||{}).find(x=>(x.a===ak&&x.b===bk)||(x.a===bk&&x.b===ak));
  if(!p){ra.innerHTML='<div class="result-card"><div class="empty">Пара не найдена</div></div>';return;}
  const fwd=p.a===ak?{s:p.speech,r:p.speechRev}:{s:p.speechRev,r:p.speech};
  const an=charName(ak),bn=charName(bk);
  ra.innerHTML=`<div class="result-card">
    <div class="result-title">${an} — ${bn}</div>
    <div class="result-row">${an}<span style="color:var(--text3);margin:0 6px">→</span>${bn}: ${badge(fwd.s)}</div>
    <div class="result-row">${bn}<span style="color:var(--text3);margin:0 6px">→</span>${an}: ${badge(fwd.r)}</div>
    ${p.note?`<div style="font-size:14px;color:var(--text3);margin-top:10px">${p.note}</div>`:''}
  </div>`;
};

// ── TABS ──────────────────────────────────────────────────────────────────
window.switchTab=function(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+t).classList.add('active');
  if(t==='history') renderHistory();
};

// ── PALETTE ───────────────────────────────────────────────────────────────
const PALETTES=[
  {id:'',color:'#d4a853',label:'Янтарь'},
  {id:'sakura',color:'#e8739a',label:'Сакура'},
  {id:'ocean',color:'#3d9cf0',label:'Океан'},
  {id:'forest',color:'#4ec068',label:'Лес'},
  {id:'violet',color:'#a060f0',label:'Фиолет'},
  {id:'rose',color:'#f05840',label:'Алый'},
  {id:'slate',color:'#6888d0',label:'Сталь'},
  {id:'copper',color:'#c87840',label:'Медь'},
];

function buildPaletteGrid(){
  const saved=localStorage.getItem('dc_palette')||'';
  document.getElementById('palette-grid').innerHTML=PALETTES.map(p=>`
    <div class="pal-item" onclick="setPalette('${p.id}')">
      <div class="pal-dot${p.id===saved?' active':''}" data-pal="${p.id}" style="background:${p.color}"></div>
      <div class="pal-dot-label">${p.label}</div>
    </div>`).join('');
  updateSwatch(saved);
}
function updateSwatch(pal){const p=PALETTES.find(x=>x.id===pal)||PALETTES[0];document.getElementById('pal-swatch').style.background=p.color;}

window.setPalette=function(pal){
  PALETTES.forEach(p=>document.body.classList.remove('palette-'+p.id));
  if(pal) document.body.classList.add('palette-'+pal);
  localStorage.setItem('dc_palette',pal);
  document.querySelectorAll('.pal-dot').forEach(d=>d.classList.toggle('active',d.dataset.pal===pal));
  updateSwatch(pal);
  document.getElementById('palette-dropdown').classList.remove('open');
};
window.togglePaletteDropdown=()=>document.getElementById('palette-dropdown').classList.toggle('open');
document.addEventListener('click',e=>{
  if(!document.getElementById('palette-wrap').contains(e.target))
    document.getElementById('palette-dropdown').classList.remove('open');
});

// ── THEME ─────────────────────────────────────────────────────────────────
window.toggleTheme=function(isLight){
  document.body.classList.toggle('light',isLight);
  localStorage.setItem('dc_theme',isLight?'light':'dark');
};

// ── INIT ──────────────────────────────────────────────────────────────────
(function(){
  const pal=localStorage.getItem('dc_palette')||'';
  if(pal) document.body.classList.add('palette-'+pal);
  if(localStorage.getItem('dc_theme')==='light'){
    document.body.classList.add('light');
    const chk=document.getElementById('theme-chk');
    if(chk) chk.checked=true;
  }
  buildPaletteGrid();
})();
</script>
